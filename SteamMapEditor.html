<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Editor - MrNuke Edition (67% Scale)</title>
    <style>
        @font-face {
            font-family: 'Oetztype-Restored';
            src: url('https://raw.githubusercontent.com/nebulimity/btd5-restored/main/godot/assets/fonts/oetztype.ttf') format('truetype');
            font-display: swap;
        }

        body { 
            font-family: 'Oetztype-Restored', 'Segoe UI', sans-serif; 
            background: #1a1a1d; 
            color: #efefef; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            zoom: 0.67; 
            -moz-transform: scale(0.67);
            -moz-transform-origin: 0 0;
        }

        .hud-window { position: absolute; background: #1e1e23; border: 2px solid #00aaff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 100; display: flex; flex-direction: column; overflow: hidden; }
        .hud-header { background: #00aaff; color: #000; padding: 10px 15px; cursor: move; font-size: 14px; text-transform: uppercase; user-select: none; flex-shrink: 0; display: flex; justify-content: space-between; }
        .hud-content { display: flex; padding: 10px; gap: 8px; background: #1e1e23; flex-grow: 1; overflow-y: auto; }
        
        #hud-files { top: 20px; left: 20px; width: 300px; border-color: #00ffcc; }
        #hud-files .hud-header { background: #00ffcc; }
        #hud-toolbox { top: 150px; left: 20px; width: 300px; }
        
        #brush-size-container { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; align-items: center; gap: 10px; }
        .size-slider { flex-grow: 1; cursor: pointer; accent-color: #00aaff; }

        #hud-editor { top: 20px; left: 340px; width: 800px; height: 600px; resize: both; overflow: auto; min-width: 400px; min-height: 300px; }
        #canvas-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: crosshair; flex-grow: 1; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .btn-ui { cursor: pointer; border-radius: 4px; background: #111; width: 42px; height: 42px; border: 1px solid #333; flex-shrink: 0; }
        .btn-ui:hover { border-color: #00aaff; }
        
        #palette { display: none; background: #111; padding: 5px; border-radius: 4px; margin-top: 5px; gap: 5px; flex-wrap: wrap; }
        .color-swatch { width: 24px; height: 24px; border-radius: 2px; cursor: pointer; border: 1px solid #fff; }
        #log-overlay { position: absolute; bottom: 10px; left: 10px; font-size: 11px; color: #00ffcc; pointer-events: none; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="hud-files" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-files')">Asset Loader</div>
        <div class="hud-content" style="flex-direction: column;">
            <input type="file" id="imgInput" accept="image/png">
            <input type="file" id="pathInput" accept=".path">
            <button style="font-family:'Oetztype-Restored'; background:#c0392b; color:white; border:none; margin-top:10px; cursor:pointer; padding:8px; border-radius:4px;" onclick="revertAll()">REVERT ALL</button>
        </div>
    </div>

    <div id="hud-toolbox" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-toolbox')">Toolbox</div>
        <div class="hud-content" style="flex-direction: column;">
            <div id="toolbar" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
            <div id="palette"><div id="swatch-container" style="display:flex; gap:4px;"></div></div>
            
            <div id="brush-size-container">
                <canvas id="btn-edit_mask_brush_size" width="42" height="42" class="btn-ui" style="cursor:default;"></canvas>
                <input type="range" id="sizeSlider" class="size-slider" min="5" max="150" value="15">
                <span id="sizeValue" style="font-size:12px; width:30px;">15</span>
            </div>

            <div id="status" style="font-size:11px; color:#00ffcc; margin-top:5px;">Tool: edit_path_select</div>
        </div>
    </div>

    <div id="hud-editor" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-editor')">Map Viewer</div>
        <div id="canvas-container">
            <canvas id="editorCanvas"></canvas>
            <div id="log-overlay">Ready</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    const maskCanvas = document.createElement('canvas');
    const mCtx = maskCanvas.getContext('2d');
    const UI_PNG = 'https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/f9ecf014-0326-4eb6-82fc-f36457acfdfe.png';
    const uiImage = new Image();

    // Paint Bucket Assets
    const bucketNormal = new Image(); bucketNormal.src = 'https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/9ff742a7-8b09-418b-8e84-48ad78666321.png';
    const bucketSelected = new Image(); bucketSelected.src = 'https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/c436a5c6-2f66-4aff-b687-00aa298b0f1d.png';

    let bgImage = null, pathData = { Nodes: [], Links: [] };
    let currentTool = "edit_path_select", activeColor = "#00FF00", brushSize = 15, isBucketMode = false;
    let scale = 1, viewX = 0, viewY = 0, spacePressed = false;
    let isDrawing = false, isDragging = false, isPanning = false, isBoxSelecting = false;
    let selectedNode = null, selectedNodes = [], history = [];
    let boxStartX, boxStartY, boxEndX, boxEndY, dragStartX, dragStartY, panStartX, panStartY;

    const UI_MAP = {
        "edit_path_select": {u: [301, 43], s: [215, 129]},
        "edit_path_move": {u: [219, 0], s: [172, 172]},
        "edit_path_spawn": {u: [215, 172], s: [348, 0]},
        "edit_path_underground": {u: [391, 0], s: [258, 129]},
        "edit_path_flag": {u: [172, 86], s: [86, 172]},        
        "edit_mask_paintbrush": {u: [129, 43], s: [133, 0]},
        "edit_mask_road_brush": {u: [172, 43], s: [176, 0]},
        "edit_mask_water": {u: [86, 86], s: [0, 170]},
        "edit_mask_block_tower": {u: [43, 43], s: [0, 84]},
        "paint_bucket": { external: true },
        "edit_mask_brush_size": {u: [86, 43], s: [90, 0]},
        "main_menu_undo": {u: [43, 258], s: [86, 215]},
        "save": {u: [43, 301], s: [86, 258]}
    };

    const PALETTES = {
        "edit_mask_paintbrush": [{n:"Land", c:"#00FF00"}, {n:"NoLand", c:"#808080"}],
        "edit_mask_road_brush": [{n:"Path", c:"#008000"}, {n:"NoPath", c:"#000000"}],
        "edit_mask_water": [{n:"Water", c:"#00FFFF"}, {n:"NoWater", c:"#0000FF"}],
        "edit_mask_block_tower": [{n:"WPath", c:"#008080"}, {n:"NoWPath", c:"#000080"}]
    };

    function startDrag(e, id) {
        if (e.target !== e.currentTarget) return;
        const hud = document.getElementById(id);
        let hStartX = e.clientX, hStartY = e.clientY;
        const moveHandler = (ev) => {
            hud.style.top = (hud.offsetTop - (hStartY - ev.clientY)) + "px";
            hud.style.left = (hud.offsetLeft - (hStartX - ev.clientX)) + "px";
            hStartX = ev.clientX; hStartY = ev.clientY;
        };
        const upHandler = () => { document.removeEventListener('mousemove', moveHandler); document.removeEventListener('mouseup', upHandler); };
        document.addEventListener('mousemove', moveHandler);
        document.addEventListener('mouseup', upHandler);
    }

    const resizeObserver = new ResizeObserver(entries => {
        for (let entry of entries) { canvas.width = entry.contentRect.width; canvas.height = entry.contentRect.height; render(); }
    });
    resizeObserver.observe(document.getElementById('canvas-container'));

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const z = 0.67; 
        const rawX = (e.clientX / z) - (rect.left / z);
        const rawY = (e.clientY / z) - (rect.top / z);
        return { worldX: (rawX - viewX) / scale, worldY: (rawY - viewY) / scale, rawX, rawY };
    }

    canvas.addEventListener('mousedown', (e) => {
        const pos = getMousePos(e);
        if (e.button === 1 || spacePressed || (e.shiftKey && e.button === 0)) { 
            isPanning = true; panStartX = pos.rawX - viewX; panStartY = pos.rawY - viewY; return; 
        }
        saveState();
        if (currentTool.includes("mask")) {
            if (isBucketMode) floodFill(Math.round(pos.worldX), Math.round(pos.worldY), activeColor);
            else { isDrawing = true; paint(pos.worldX, pos.worldY); }
        } else {
            let hit = null;
            pathData.Nodes.forEach(n => n.Points.forEach(pt => { if(Math.hypot(pt[0]-pos.worldX, pt[1]-pos.worldY) < 15/scale) hit = pt; }));
            if (hit) { isDragging = true; selectedNode = hit; dragStartX = pos.worldX; dragStartY = pos.worldY; }
            else if (currentTool === "edit_path_select") { isBoxSelecting = true; boxStartX = pos.worldX; boxStartY = pos.worldY; }
        }
        render();
    });

    canvas.addEventListener('mousemove', (e) => {
        const pos = getMousePos(e);
        if (isPanning) { viewX = pos.rawX - panStartX; viewY = pos.rawY - panStartY; }
        else if (isDrawing) paint(pos.worldX, pos.worldY);
        else if (isDragging) {
            const dx = pos.worldX - dragStartX, dy = pos.worldY - dragStartY;
            if (selectedNode) { selectedNode[0] += dx; selectedNode[1] += dy; }
            dragStartX = pos.worldX; dragStartY = pos.worldY;
        }
        render();
    });

    window.addEventListener('mouseup', () => { isPanning = false; isDrawing = false; isDragging = false; isBoxSelecting = false; render(); });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const pos = getMousePos(e);
        scale = Math.min(Math.max(0.1, e.deltaY < 0 ? scale * 1.15 : scale / 1.15), 15);
        viewX = pos.rawX - pos.worldX * scale; viewY = pos.rawY - pos.worldY * scale;
        render();
    }, { passive: false });

    function paint(x, y) { mCtx.fillStyle = activeColor; mCtx.beginPath(); mCtx.arc(x, y, brushSize, 0, Math.PI * 2); mCtx.fill(); }

    function setTool(name) {
        if (name === "paint_bucket") isBucketMode = !isBucketMode;
        else { currentTool = name; isBucketMode = false; }
        
        const pal = document.getElementById('palette');
        const cont = document.getElementById('swatch-container');
        const sizeContainer = document.getElementById('brush-size-container');
        const bucketBtn = document.getElementById('btn-paint_bucket');

        const isMask = currentTool.includes("mask");

        if (isMask) {
            pal.style.display = 'flex'; cont.innerHTML = '';
            PALETTES[currentTool].forEach(item => {
                const sw = document.createElement('div'); sw.className = 'color-swatch'; sw.style.background = item.c;
                sw.onclick = () => activeColor = item.c; cont.appendChild(sw);
            });
            activeColor = PALETTES[currentTool][0].c;
            sizeContainer.style.display = 'flex';
            bucketBtn.style.display = 'block';
        } else {
            pal.style.display = 'none';
            sizeContainer.style.display = 'none';
            bucketBtn.style.display = 'none';
        }
        updateToolbar();
        document.getElementById('status').textContent = `Tool: ${currentTool}`;
    }

    function updateToolbar() {
        Object.entries(UI_MAP).forEach(([name, pos]) => {
            const btn = document.getElementById(`btn-${name}`);
            if(!btn) return;
            const bCtx = btn.getContext('2d');
            bCtx.clearRect(0,0,42,42);

            if (name === "paint_bucket") {
                const img = isBucketMode ? bucketSelected : bucketNormal;
                bCtx.drawImage(img, 0, 0, 42, 42);
            } else {
                let isSelected = (currentTool === name);
                if (name === "edit_mask_brush_size" && currentTool.includes("mask")) isSelected = true;
                const coords = isSelected ? pos.s : pos.u;
                bCtx.drawImage(uiImage, coords[0], coords[1], 42, 42, 0, 0, 42, 42);
            }
        });
    }

    function initUI() {
        const toolbar = document.getElementById('toolbar');
        Object.keys(UI_MAP).forEach(name => {
            if (name === "edit_mask_brush_size") return;
            const btn = document.createElement('canvas'); btn.width = 42; btn.height = 42; btn.className = "btn-ui"; btn.id = `btn-${name}`;
            btn.onclick = () => (name === "main_menu_undo" ? undo() : (name === "save" ? exportData() : setTool(name)));
            toolbar.appendChild(btn);
        });

        const slider = document.getElementById('sizeSlider');
        slider.oninput = function() { brushSize = parseInt(this.value); document.getElementById('sizeValue').innerText = this.value; };

        uiImage.src = UI_PNG; uiImage.onload = updateToolbar;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(viewX, viewY); ctx.scale(scale, scale);
        if (bgImage) ctx.drawImage(bgImage, 0, 0);
        ctx.globalAlpha = 0.7; ctx.drawImage(maskCanvas, 0, 0); ctx.globalAlpha = 1;
        pathData.Nodes.forEach(node => {
            ctx.beginPath(); ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2/scale;
            node.Points.forEach((pt, i) => i === 0 ? ctx.moveTo(pt[0], pt[1]) : ctx.lineTo(pt[0], pt[1]));
            ctx.stroke();
            node.Points.forEach(pt => { ctx.fillStyle = pt === selectedNode ? "white" : "red"; ctx.beginPath(); ctx.arc(pt[0], pt[1], 4/scale, 0, 7); ctx.fill(); });
        });
        ctx.restore();
    }

    function saveState() { if (history.length > 20) history.shift(); history.push({ mask: maskCanvas.toDataURL() }); }
    function undo() { if (history.length === 0) return; const s = history.pop(); const i = new Image(); i.onload = () => { mCtx.clearRect(0,0,maskCanvas.width,maskCanvas.height); mCtx.drawImage(i,0,0); render(); }; i.src = s.mask; }
    function exportData() { console.log("Exporting..."); }
    function revertAll() { if(confirm("Clear?")) { mCtx.clearRect(0,0,maskCanvas.width,maskCanvas.height); render(); } }

    document.getElementById('imgInput').onchange = (e) => {
        const r = new FileReader(); r.onload = (ev) => {
            bgImage = new Image(); bgImage.onload = () => { maskCanvas.width = bgImage.width; maskCanvas.height = bgImage.height; render(); };
            bgImage.src = ev.target.result;
        }; r.readAsDataURL(e.target.files[0]);
    };

    initUI();
</script>
</body>
</html>
