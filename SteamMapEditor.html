<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Editor - MrNuke Edition</title>
    <style>
        @font-face {
            font-family: 'Oetztype-Restored';
            src: url('https://raw.githubusercontent.com/nebulimity/btd5-restored/main/godot/assets/fonts/oetztype.ttf') format('truetype');
            font-display: swap;
        }

        body { 
            font-family: 'Oetztype-Restored', sans-serif; 
            background: #1a1a1d; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            zoom: 0.67; 
        }

        .hud-window { position: absolute; background: #1e1e23; border: 2px solid #00aaff; border-radius: 8px; z-index: 100; display: flex; flex-direction: column; }
        .hud-header { background: #00aaff; color: #000; padding: 10px; cursor: move; font-size: 14px; text-transform: uppercase; user-select: none; }
        .hud-content { display: flex; padding: 10px; gap: 8px; background: #1e1e23; flex-direction: column; }
        
        #hud-files { top: 20px; left: 20px; width: 300px; border-color: #00ffcc; }
        #hud-files .hud-header { background: #00ffcc; }
        #hud-toolbox { top: 180px; left: 20px; width: 320px; }
        
        #brush-size-container { 
            display: none; 
            margin-top: 10px; 
            padding: 10px; 
            border-top: 1px solid #333; 
            align-items: center; 
            gap: 12px; 
        }

        #hud-editor { top: 20px; left: 360px; width: 1100px; height: 800px; resize: both; overflow: hidden; }
        #canvas-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        .btn-ui { cursor: pointer; border-radius: 4px; background: #111; width: 42px; height: 42px; border: 1px solid #333; }
        .color-swatch { width: 28px; height: 28px; cursor: pointer; border: 2px solid transparent; }
        #palette { display: none; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="hud-files" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-files')">Asset Loader</div>
        <div class="hud-content">
            <label style="font-size:10px; color:#00ffcc;">MAP IMAGE</label>
            <input type="file" id="imgInput" accept="image/png">
            <label style="font-size:10px; color:#00ffcc; margin-top:5px;">PATH DATA (.path)</label>
            <input type="file" id="pathInput" accept=".path">
        </div>
    </div>

    <div id="hud-toolbox" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-toolbox')">Toolbox</div>
        <div class="hud-content">
            <div id="toolbar" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
            <div id="palette"><div id="swatch-container" style="display:flex; gap:6px;"></div></div>
            <div id="brush-size-container">
                <canvas id="btn-edit_mask_brush_size" width="42" height="42"></canvas>
                <input type="range" id="sizeSlider" min="5" max="150" value="15" style="flex-grow:1;">
                <span id="sizeValue">15</span>
            </div>
        </div>
    </div>

    <div id="hud-editor" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-editor')">Map Viewer</div>
        <div id="canvas-container"><canvas id="editorCanvas"></canvas></div>
    </div>

<script>
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    const maskCanvas = document.createElement('canvas');
    const mCtx = maskCanvas.getContext('2d');
    const UI_PNG = 'https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/f9ecf014-0326-4eb6-82fc-f36457acfdfe.png';
    const uiImage = new Image();

    let bgImage = null, pathData = { Nodes: [] };
    let currentTool = "edit_path_select", activeColor = "#00FF00", brushSize = 15;
    let scale = 1, viewX = 0, viewY = 0, isDrawing = false;

    const UI_MAP = {
        "edit_path_select": {u: [301, 43], s: [215, 129]},
        "edit_mask_paintbrush": {u: [129, 43], s: [133, 0]},
        "edit_mask_road_brush": {u: [172, 43], s: [176, 0]},
        "edit_mask_water": {u: [86, 86], s: [0, 170]},
        "edit_mask_brush_size": {u: [86, 43], s: [90, 0]}
    };

    function startDrag(e, id) {
        if (e.target !== e.currentTarget) return;
        const hud = document.getElementById(id);
        let sX = e.clientX, sY = e.clientY;
        const move = (ev) => {
            hud.style.top = (hud.offsetTop + (ev.clientY - sY)/0.67) + "px";
            hud.style.left = (hud.offsetLeft + (ev.clientX - sX)/0.67) + "px";
            sX = ev.clientX; sY = ev.clientY;
        };
        const stop = () => { window.removeEventListener('mousemove', move); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const rawX = (e.clientX / 0.67) - rect.left;
        const rawY = (e.clientY / 0.67) - rect.top;
        return { worldX: (rawX - viewX) / scale, worldY: (rawY - viewY) / scale };
    }

    // Path Loader
    document.getElementById('pathInput').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                pathData = JSON.parse(ev.target.result);
                render();
            } catch (err) { alert("Invalid .path file."); }
        };
        reader.readAsText(e.target.files[0]);
    };

    canvas.addEventListener('mousedown', (e) => { if(currentTool.includes("mask")) isDrawing = true; paint(getMousePos(e)); });
    canvas.addEventListener('mousemove', (e) => { if(isDrawing) paint(getMousePos(e)); });
    window.addEventListener('mouseup', () => isDrawing = false);

    function paint(pos) {
        mCtx.fillStyle = activeColor;
        mCtx.beginPath(); mCtx.arc(pos.worldX, pos.worldY, brushSize, 0, Math.PI*2); mCtx.fill();
        render();
    }

    function render() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.translate(viewX, viewY); ctx.scale(scale, scale);
        if(bgImage) ctx.drawImage(bgImage, 0, 0);
        ctx.globalAlpha = 0.6; ctx.drawImage(maskCanvas, 0, 0); ctx.globalAlpha = 1;

        if(pathData.Nodes) {
            pathData.Nodes.forEach(node => {
                ctx.beginPath(); ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2/scale;
                node.Points.forEach((pt, i) => i === 0 ? ctx.moveTo(pt[0], pt[1]) : ctx.lineTo(pt[0], pt[1]));
                ctx.stroke();
                node.Points.forEach(pt => { ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(pt[0], pt[1], 4/scale, 0, 7); ctx.fill(); });
            });
        }
        ctx.restore();
    }

    function setTool(name) {
        currentTool = name;
        const isMask = name.includes("mask");
        document.getElementById('brush-size-container').style.display = isMask ? 'flex' : 'none';
        updateToolbar();
    }

    function updateToolbar() {
        Object.entries(UI_MAP).forEach(([name, pos]) => {
            const btn = document.getElementById(`btn-${name}`);
            if(!btn) return;
            const bCtx = btn.getContext('2d');
            const isSelected = (currentTool === name) || (name === "edit_mask_brush_size" && currentTool.includes("mask"));
            const coords = isSelected ? pos.s : pos.u;
            bCtx.clearRect(0,0,42,42);
            bCtx.drawImage(uiImage, coords[0], coords[1], 42, 42, 0, 0, 42, 42);
        });
    }

    function initUI() {
        const toolbar = document.getElementById('toolbar');
        Object.keys(UI_MAP).forEach(name => {
            if(name === "edit_mask_brush_size") return;
            const btn = document.createElement('canvas'); btn.width = 42; btn.height = 42; btn.className = "btn-ui"; btn.id = `btn-${name}`;
            btn.onclick = () => setTool(name); toolbar.appendChild(btn);
        });
        uiImage.src = UI_PNG; uiImage.onload = () => { updateToolbar(); setTool("edit_path_select"); };
    }

    document.getElementById('sizeSlider').oninput = function() { 
        brushSize = this.value; document.getElementById('sizeValue').innerText = this.value; 
    };

    document.getElementById('imgInput').onchange = (e) => {
        const r = new FileReader(); r.onload = (ev) => {
            bgImage = new Image(); bgImage.onload = () => {
                maskCanvas.width = bgImage.width; maskCanvas.height = bgImage.height;
                canvas.width = 1100; canvas.height = 760; render();
            }; bgImage.src = ev.target.result;
        }; r.readAsDataURL(e.target.files[0]);
    };

    initUI();
</script>
</body>
</html>
