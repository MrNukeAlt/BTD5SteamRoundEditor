<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Editor - MrNuke Edition (Full Restoration)</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a1a1d; 
            color: #efefef; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            zoom: 0.67; 
            -moz-transform: scale(0.67);
            -moz-transform-origin: 0 0;
        }

        .hud-window { position: absolute; background: #1e1e23; border: 2px solid #00aaff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 100; display: flex; flex-direction: column; overflow: hidden; }
        .hud-header { background: #00aaff; color: #000; padding: 8px 15px; cursor: move; font-size: 11px; font-weight: 900; text-transform: uppercase; user-select: none; flex-shrink: 0; display: flex; justify-content: space-between; }
        .hud-content { display: flex; padding: 10px; gap: 8px; background: #1e1e23; flex-grow: 1; overflow-y: auto; }
        
        #hud-files { top: 20px; left: 20px; width: 320px; border-color: #00ffcc; }
        #hud-files .hud-header { background: #00ffcc; }
        #hud-toolbox { top: 410px; left: 20px; width: 300px; }
        #hud-help { top: 20px; left: 1180px; width: 350px; border-color: #ff00ff; }
        #hud-help .hud-header { background: #ff00ff; }

        .save-section { margin-top: 10px; padding-top: 10px; border-top: 2px solid #333; display: flex; flex-direction: column; gap: 5px; }
        .btn-save { padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #000; text-align: center; text-decoration: none; font-size: 12px; }
        .btn-path { background: #00ffcc; }
        .btn-mask { background: #ffaa00; }
        .btn-wrench { background: #555; color: #fff; margin-top: 5px; }

        #brush-size-container, #flags-container { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; align-items: center; gap: 10px; }
        .size-slider { flex-grow: 1; cursor: pointer; accent-color: #00aaff; }

        #hud-editor { top: 20px; left: 360px; width: 800px; height: 600px; resize: both; overflow: auto; min-width: 400px; min-height: 300px; }
        #canvas-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; cursor: crosshair; flex-grow: 1; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .btn-ui { cursor: pointer; border-radius: 4px; background: #111; width: 42px; height: 42px; border: 1px solid #333; flex-shrink: 0; }
        .btn-ui:hover { border-color: #00aaff; }
        
        #palette { display: none; background: #111; padding: 10px; border-radius: 4px; margin-top: 5px; gap: 8px; flex-wrap: wrap; border: 1px solid #333; }
        .color-swatch { width: 30px; height: 30px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.active { border-color: #00ffcc; box-shadow: 0 0 8px #00ffcc; }
        
        #status { font-size: 10px; color: #00ffcc; margin-top: 5px; font-weight: bold; }
        kbd { background: #333; padding: 2px 4px; border-radius: 3px; font-size: 10px; }
        .flag-counter { font-size: 18px; color: #00ffcc; font-weight: bold; cursor: pointer; padding: 0 10px; border: 1px solid #333; border-radius: 4px; background: #111; }
    </style>
</head>
<body>

    <div id="hud-files" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-files')">Asset Manager</div>
        <div class="hud-content" style="flex-direction: column;">
            <label style="font-size:10px; color:#00ffcc;">LOAD BACKGROUND/MASK (.PNG)</label>
            <input type="file" id="imgInput" accept="image/png">
            <label style="font-size:10px; color:#00ffcc; margin-top:5px;">LOAD PATH DATA (.PATH)</label>
            <input type="file" id="pathInput" accept=".path">
            
            <div class="save-section">
                <button class="btn-save btn-path" onclick="savePath()">SAVE .PATH</button>
                <button class="btn-save btn-mask" onclick="saveMask()">SAVE MASK .PNG</button>
                <a href="https://topper64.co.uk/nk/btd5/monkey_wrench.exe" class="btn-save btn-wrench">DOWNLOAD MONKEY WRENCH</a>
            </div>
            <button style="background:#c0392b; color:white; border:none; margin-top:5px; cursor:pointer; padding:5px; border-radius:4px; font-size:10px;" onclick="revertAll()">REVERT ALL</button>
        </div>
    </div>

    <div id="hud-toolbox" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-toolbox')">Toolbox</div>
        <div class="hud-content" style="flex-direction: column;">
            <div id="toolbar" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
            <div id="palette"><div id="swatch-container" style="display:flex; gap:10px;"></div></div>
            <div id="brush-size-container">
                <canvas id="btn-edit_mask_brush_size" width="42" height="42" class="btn-ui" style="cursor:default;"></canvas>
                <input type="range" id="sizeSlider" class="size-slider" min="5" max="150" value="15">
                <span id="sizeValue" style="font-size:10px; width:20px; color:white;">15</span>
            </div>
            <div id="flags-container">
                <span style="font-size:10px; color:#00ffcc;">FLAGS:</span>
                <canvas id="flag-toggle-icon" width="42" height="42" class="btn-ui" onclick="cycleFlags()"></canvas>
                <span id="flagValue" class="flag-counter" onclick="cycleFlags()">0</span>
            </div>
            <div id="status">Tool: edit_path_select</div>
        </div>
    </div>

    <div id="hud-help" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-help')">Controls</div>
        <div class="hud-content" style="font-size: 12px; flex-direction: column; color: #ccc;">
            • <kbd>Shift + Drag</kbd>: Move All Layers Sync<br>
            • <kbd>Space + Drag</kbd>: Pan View<br>
            • <kbd>Scroll</kbd>: Zoom to Cursor<br>
            • <kbd>Ctrl + Z</kbd>: Undo<br>
            • <kbd>Del</kbd>: Delete Nodes
            <hr style="border: 0; border-top: 1px solid #444; margin: 10px 0;">
            <div style="font-size: 10px; color: #00ffcc; text-align: center; font-weight: bold;">
                Website Made By: MrNuke
            </div>
        </div>
    </div>

    <div id="hud-editor" class="hud-window">
        <div class="hud-header" onmousedown="startDrag(event, 'hud-editor')">Map Viewer</div>
        <div id="canvas-container">
            <canvas id="editorCanvas"></canvas>
        </div>
    </div>

<script>
    const canvas = document.getElementById('editorCanvas');
    const ctx = canvas.getContext('2d');
    const maskCanvas = document.createElement('canvas');
    const mCtx = maskCanvas.getContext('2d');
    const moveBufferCanvas = document.createElement('canvas');
    const bCtx = moveBufferCanvas.getContext('2d');
    
    const UI_PNG = 'https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/f9ecf014-0326-4eb6-82fc-f36457acfdfe.png';
    const BUCKET_IDLE = 'https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/9ff742a7-8b09-418b-8e84-48ad78666321.png';
    const BUCKET_ACTIVE = 'https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/c436a5c6-2f66-4aff-b687-00aa298b0f1d.png';

    const uiImage = new Image(), bucketIdleImg = new Image(), bucketActiveImg = new Image();

    let bgImage = null, pathData = { Nodes: [] };
    let bgOffsetX = 0, bgOffsetY = 0;
    let currentTool = "edit_path_select", activeColor = "#00FF00", brushSize = 15;
    let scale = 1, viewX = 0, viewY = 0, spacePressed = false, shiftPressed = false;
    let isDrawing = false, isPanning = false, isBoxSelecting = false, isMovingLayer = false, isDraggingNodes = false;
    let panStartX, panStartY, boxStartX, boxStartY, currentMousePos = {x:0, y:0};
    let selectedPoints = [], dragOriginWorld = {x:0, y:0}, historyStack = [];

    const UI_MAP = {
        "main_menu_undo": {u: [43, 258], s: [86, 215]},
        "edit_path_select": {u: [301, 43], s: [215, 129]},
        "edit_path_move": {u: [219, 0], s: [172, 172]},
        "edit_path_spawn": {u: [215, 172], s: [348, 0]},
        "edit_path_underground": {u: [391, 0], s: [258, 129]},
        "edit_path_flag": {u: [172, 86], s: [86, 172]},        
        "edit_mask_paintbrush": {u: [129, 43], s: [133, 0]},
        "edit_mask_road_brush": {u: [172, 43], s: [176, 0]},
        "edit_mask_water": {u: [86, 86], s: [0, 170]},
        "edit_mask_block_tower": {u: [43, 43], s: [0, 84]},
        "edit_mask_bucket": {special: "bucket"},
        "edit_mask_brush_size": {u: [86, 43], s: [90, 0]}
    };

    const PALETTES = {
        "edit_mask_paintbrush": [{c: "#00FF00"}, {c: "#808080"}],
        "edit_mask_road_brush": [{c: "#008000"}, {c: "#000000"}],
        "edit_mask_water": [{c: "#008080"}, {c: "#000080"}],
        "edit_mask_block_tower": [{c: "#00FFFF"}, {c: "#000080"}],
        "edit_mask_bucket": [{c: "#00FF00"}, {c: "#808080"}, {c: "#008000"}, {c: "#000000"}, {c: "#008080"}, {c: "#000080"}]
    };

    function saveState() {
        historyStack.push({ path: JSON.stringify(pathData), mask: maskCanvas.toDataURL(), bgX: bgOffsetX, bgY: bgOffsetY });
        if (historyStack.length > 50) historyStack.shift();
    }

    function undo() {
        if (historyStack.length > 0) {
            let state = historyStack.pop();
            pathData = JSON.parse(state.path); bgOffsetX = state.bgX; bgOffsetY = state.bgY;
            let img = new Image(); img.onload = () => { mCtx.clearRect(0,0,maskCanvas.width, maskCanvas.height); mCtx.drawImage(img, 0, 0); render(); };
            img.src = state.mask; selectedPoints = []; render();
        }
    }

    function floodFill(worldX, worldY, fillColor) {
        const x = Math.floor(worldX - bgOffsetX), y = Math.floor(worldY - bgOffsetY);
        if (x < 0 || x >= maskCanvas.width || y < 0 || y >= maskCanvas.height) return;
        const imageData = mCtx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
        const pixels = imageData.data, startPos = (y * maskCanvas.width + x) * 4;
        const sR = pixels[startPos], sG = pixels[startPos+1], sB = pixels[startPos+2], sA = pixels[startPos+3];
        const match = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(fillColor);
        const tR = parseInt(match[1], 16), tG = parseInt(match[2], 16), tB = parseInt(match[3], 16);
        if (sR === tR && sG === tG && sB === tB && sA === 255) return;
        const stack = [[x, y]];
        while (stack.length) {
            const [curX, curY] = stack.pop();
            const p = (curY * maskCanvas.width + curX) * 4;
            if (curX>=0 && curX<maskCanvas.width && curY>=0 && curY<maskCanvas.height && pixels[p]===sR && pixels[p+1]===sG && pixels[p+2]===sB && pixels[p+3]===sA) {
                pixels[p]=tR; pixels[p+1]=tG; pixels[p+2]=tB; pixels[p+3]=255;
                stack.push([curX+1, curY], [curX-1, curY], [curX, curY+1], [curX, curY-1]);
            }
        }
        mCtx.putImageData(imageData, 0, 0);
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const rawX = (e.clientX / 0.67) - (rect.left / 0.67);
        const rawY = (e.clientY / 0.67) - (rect.top / 0.67);
        return { worldX: (rawX - viewX) / scale, worldY: (rawY - viewY) / scale, rawX, rawY };
    }

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault(); const pos = getMousePos(e); 
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.min(Math.max(0.1, scale * delta), 20);
        viewX = pos.rawX - (pos.rawX - viewX) * (newScale / scale);
        viewY = pos.rawY - (pos.rawY - viewY) * (newScale / scale);
        scale = newScale; render();
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
        const pos = getMousePos(e);
        if (spacePressed || e.button === 1) { isPanning = true; panStartX = pos.rawX - viewX; panStartY = pos.rawY - viewY; return; }
        if (shiftPressed) {
            saveState(); isMovingLayer = true; dragOriginWorld = { x: pos.worldX, y: pos.worldY };
            moveBufferCanvas.width = maskCanvas.width; moveBufferCanvas.height = maskCanvas.height;
            bCtx.clearRect(0,0,maskCanvas.width,maskCanvas.height); bCtx.drawImage(maskCanvas, 0, 0);
            return;
        }
        if (currentTool === "edit_mask_bucket") { saveState(); floodFill(pos.worldX, pos.worldY, activeColor); }
        else if (currentTool.includes("mask")) {
            saveState(); isDrawing = true; mCtx.fillStyle = activeColor; mCtx.beginPath();
            mCtx.arc(pos.worldX - bgOffsetX, pos.worldY - bgOffsetY, brushSize, 0, Math.PI*2); mCtx.fill();
        } else if (currentTool.startsWith("edit_path")) {
            let found = null;
            pathData.Nodes.forEach(n => n.Points.forEach((pt, i) => { 
                if(Math.hypot((pt[0] + bgOffsetX)-pos.worldX, (pt[1] + bgOffsetY)-pos.worldY) < 15/scale) found = {node: n, idx: i}; 
            }));

            if(found) {
                if (!selectedPoints.some(s => s.node === found.node && s.idx === found.idx)) {
                    selectedPoints = [found];
                }
                if(currentTool === "edit_path_move") { saveState(); isDraggingNodes = true; dragOriginWorld = {x:pos.worldX, y:pos.worldY}; }
                if(currentTool === "edit_path_underground") { document.getElementById('flagValue').innerText = found.node.Flags || 0; }
            } else {
                if(currentTool === "edit_path_select") { isBoxSelecting = true; boxStartX = pos.worldX; boxStartY = pos.worldY; selectedPoints = []; }
                if(currentTool === "edit_path_spawn") {
                    saveState(); 
                    const newNode = { Flags: 0, Points: [[Math.round(pos.worldX - bgOffsetX), Math.round(pos.worldY - bgOffsetY)]] };
                    pathData.Nodes.push(newNode); selectedPoints = [{node: newNode, idx: 0}];
                }
                if(currentTool === "edit_path_move") { selectedPoints = []; }
            }
        }
        render();
    });

    canvas.addEventListener('mousemove', (e) => {
        const pos = getMousePos(e); currentMousePos = pos;
        if (isPanning) { viewX = pos.rawX - panStartX; viewY = pos.rawY - panStartY; } 
        else if (isMovingLayer) {
            const dx = pos.worldX - dragOriginWorld.x, dy = pos.worldY - dragOriginWorld.y;
            bgOffsetX += dx; bgOffsetY += dy;
            mCtx.clearRect(0,0,maskCanvas.width,maskCanvas.height); mCtx.drawImage(moveBufferCanvas, 0, 0);
            dragOriginWorld = {x: pos.worldX, y: pos.worldY};
        } else if (isDraggingNodes) {
            const dx = pos.worldX - dragOriginWorld.x, dy = pos.worldY - dragOriginWorld.y;
            selectedPoints.forEach(sp => { sp.node.Points[sp.idx][0] += dx; sp.node.Points[sp.idx][1] += dy; });
            dragOriginWorld = {x: pos.worldX, y: pos.worldY};
        } else if (isDrawing) {
            mCtx.fillStyle = activeColor; mCtx.beginPath(); mCtx.arc(pos.worldX - bgOffsetX, pos.worldY - bgOffsetY, brushSize, 0, Math.PI*2); mCtx.fill();
        } else if (isBoxSelecting) {
            const l = Math.min(boxStartX, pos.worldX), t = Math.min(boxStartY, pos.worldY), r = Math.max(boxStartX, pos.worldX), b = Math.max(boxStartY, pos.worldY);
            selectedPoints = [];
            pathData.Nodes.forEach(n => n.Points.forEach((pt, i) => { 
                const wx = pt[0] + bgOffsetX;
                const wy = pt[1] + bgOffsetY;
                if(wx>=l && wx<=r && wy>=t && wy<=b) selectedPoints.push({node:n, idx:i}); 
            }));
        }
        render();
    });

    window.addEventListener('mouseup', () => { isPanning=false; isMovingLayer=false; isDrawing=false; isDraggingNodes=false; isBoxSelecting=false; render(); });

    function render() {
        canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.save(); ctx.translate(viewX, viewY); ctx.scale(scale, scale);
        
        if (bgImage) { ctx.globalAlpha = 0.5; ctx.drawImage(bgImage, bgOffsetX, bgOffsetY); ctx.globalAlpha = 1; }
        ctx.globalAlpha = 0.7; ctx.drawImage(maskCanvas, bgOffsetX, bgOffsetY); ctx.globalAlpha = 1;
        
        pathData.Nodes.forEach(n => {
            ctx.beginPath(); ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2/scale;
            n.Points.forEach((p, i) => {
                const drawX = p[0] + bgOffsetX;
                const drawY = p[1] + bgOffsetY;
                i===0 ? ctx.moveTo(drawX, drawY) : ctx.lineTo(drawX, drawY);
            }); 
            ctx.stroke();
            
            if (n.Flags > 0 && n.Points.length > 0) {
                const p = n.Points[0];
                const flagSource = UI_MAP["edit_path_flag"].u;
                ctx.drawImage(uiImage, flagSource[0], flagSource[1], 42, 42, (p[0] + bgOffsetX) - 21/scale, (p[1] + bgOffsetY) - 42/scale, 42/scale, 42/scale);
                ctx.fillStyle = "white"; ctx.font = `bold ${14/scale}px Arial`; ctx.fillText(n.Flags, (p[0] + bgOffsetX) + 5/scale, (p[1] + bgOffsetY) - 25/scale);
            }

            n.Points.forEach((p, i) => {
                const sel = selectedPoints.some(s => s.node === n && s.idx === i);
                ctx.fillStyle = sel ? "white" : "#ffa500"; ctx.beginPath(); ctx.arc(p[0] + bgOffsetX, p[1] + bgOffsetY, (sel?6:4)/scale, 0, Math.PI*2); ctx.fill();
            });
        });
        
        if(isBoxSelecting) { ctx.strokeStyle = "white"; ctx.lineWidth = 1/scale; ctx.strokeRect(boxStartX, boxStartY, currentMousePos.worldX-boxStartX, currentMousePos.worldY-boxStartY); }
        ctx.restore();
    }

    function cycleFlags() {
        if (selectedPoints.length > 0) {
            saveState();
            const node = selectedPoints[0].node;
            node.Flags = (node.Flags + 1) % 6;
            document.getElementById('flagValue').innerText = node.Flags;
            render();
        }
    }

    function setTool(name) {
        currentTool = name; 
        const isMask = name.includes("mask"), isBucket = name === "edit_mask_bucket";
        document.getElementById('brush-size-container').style.display = (isMask && !isBucket) ? 'flex' : 'none';
        
        document.getElementById('flags-container').style.display = (name === 'edit_path_underground') ? 'flex' : 'none';
        if(name === 'edit_path_underground') {
            const iconCtx = document.getElementById('flag-toggle-icon').getContext('2d');
            const data = UI_MAP["edit_path_flag"].u;
            iconCtx.clearRect(0,0,42,42);
            iconCtx.drawImage(uiImage, data[0], data[1], 42, 42, 0, 0, 42, 42);
            if(selectedPoints.length > 0) document.getElementById('flagValue').innerText = selectedPoints[0].node.Flags || 0;
        }

        const pal = document.getElementById('palette'), cont = document.getElementById('swatch-container');
        if (PALETTES[name]) {
            pal.style.display = 'flex'; cont.innerHTML = '';
            PALETTES[name].forEach(item => {
                const sw = document.createElement('div'); sw.className = 'color-swatch' + (activeColor === item.c ? ' active' : '');
                sw.style.background = item.c; sw.onclick = () => { activeColor = item.c; setTool(name); }; cont.appendChild(sw);
            });
        } else pal.style.display = 'none';
        
        updateToolbar(); document.getElementById('status').textContent = `Tool: ${name}`;
    }

    function updateToolbar() {
        Object.entries(UI_MAP).forEach(([name, data]) => {
            const btn = document.getElementById(`btn-${name}`); if(!btn) return;
            const bCtxT = btn.getContext('2d'); bCtxT.clearRect(0,0,42,42);
            if(data.special === "bucket") bCtxT.drawImage(currentTool === "edit_mask_bucket" ? bucketActiveImg : bucketIdleImg, 0, 0, 42, 42);
            else { const sel = (currentTool === name) || (name === "edit_mask_brush_size" && currentTool.includes("mask")); const c = sel ? data.s : data.u; bCtxT.drawImage(uiImage, c[0], c[1], 42, 42, 0, 0, 42, 42); }
        });
    }

    function initUI() {
        const toolbar = document.getElementById('toolbar'); toolbar.innerHTML = '';
        const undoBtn = document.createElement('canvas'); undoBtn.width = 42; undoBtn.height = 42; undoBtn.className = "btn-ui"; undoBtn.id = `btn-main_menu_undo`; undoBtn.onclick = undo; toolbar.appendChild(undoBtn);
        Object.keys(UI_MAP).forEach(name => { 
            if (name === "edit_mask_brush_size" || name === "main_menu_undo") return; 
            const btn = document.createElement('canvas'); btn.width = 42; btn.height = 42; btn.className = "btn-ui"; btn.id = `btn-${name}`; btn.onclick = () => setTool(name); toolbar.appendChild(btn); 
        });
        document.getElementById('sizeSlider').oninput = function() { brushSize = parseInt(this.value); document.getElementById('sizeValue').innerText = this.value; };
        uiImage.src = UI_PNG; bucketIdleImg.src = BUCKET_IDLE; bucketActiveImg.src = BUCKET_ACTIVE;
        uiImage.onload = () => { updateToolbar(); setTool("edit_path_select"); };
    }

    document.getElementById('imgInput').onchange = (e) => {
        const r = new FileReader(); r.onload = (ev) => { bgImage = new Image(); bgImage.onload = () => { maskCanvas.width = bgImage.width; maskCanvas.height = bgImage.height; render(); }; bgImage.src = ev.target.result; }; r.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('pathInput').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => {
            try {
                pathData = JSON.parse(ev.target.result);
                if ((bgImage || maskCanvas.width > 0) && pathData.Nodes && pathData.Nodes.length > 0) {
                    const targetWidth = bgImage ? bgImage.width : maskCanvas.width;
                    const targetHeight = bgImage ? bgImage.height : maskCanvas.height;
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    let hasPoints = false;
                    pathData.Nodes.forEach(node => {
                        node.Points.forEach(pt => {
                            if (pt[0] < minX) minX = pt[0]; if (pt[1] < minY) minY = pt[1];
                            if (pt[0] > maxX) maxX = pt[0]; if (pt[1] > maxY) maxY = pt[1];
                            hasPoints = true;
                        });
                    });
                    if (hasPoints) {
                        const shiftX = Math.round((targetWidth / 2) - ((minX + maxX) / 2));
                        const shiftY = Math.round((targetHeight / 2) - ((minY + maxY) / 2));
                        pathData.Nodes.forEach(node => { node.Points.forEach(pt => { pt[0] += shiftX; pt[1] += shiftY; }); });
                    }
                }
                render();
            } catch (err) { alert("Error parsing .path file."); }
        };
        r.readAsText(e.target.files[0]);
    };

    function savePath() { const b = new Blob([JSON.stringify(pathData, null, 4)], {type: "application/json"}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = "map.path"; a.click(); }
    function saveMask() { const a = document.createElement('a'); a.href = maskCanvas.toDataURL(); a.download = "mask.png"; a.click(); }
    function revertAll() { if(confirm("Revert?")) { mCtx.clearRect(0,0,maskCanvas.width,maskCanvas.height); pathData.Nodes = []; bgOffsetX = 0; bgOffsetY = 0; render(); } }
    function startDrag(e, id) { const h = document.getElementById(id); let x=e.clientX, y=e.clientY; const mv=(ev)=>{ h.style.top = (h.offsetTop+(ev.clientY-y)/0.67)+"px"; h.style.left = (h.offsetLeft+(ev.clientX-x)/0.67)+"px"; x=ev.clientX; y=ev.clientY; }; const up=()=>{ document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); }; document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up); }

    initUI();
    window.addEventListener('resize', render);
    window.addEventListener('keydown', (e) => { if(e.code==='Space') spacePressed=true; if(e.shiftKey) shiftPressed=true; if(e.ctrlKey && e.key==='z') undo(); if(e.key==='Delete') { saveState(); selectedPoints.forEach(p => p.node.Points.splice(p.idx, 1)); selectedPoints=[]; render(); } });
    window.addEventListener('keyup', (e) => { if(e.code==='Space') spacePressed=false; if(!e.shiftKey) shiftPressed=false; });
</script>
</body>
</html>
