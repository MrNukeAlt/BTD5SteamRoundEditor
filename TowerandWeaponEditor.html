<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTD5 Weapon Master - Full Arsenal Integrated</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #00d4ff; --text: #e0e0e0; --success: #00ff88; --error: #ff4d4d; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #000; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; justify-content: space-between; }
        #editor-pane { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        
        .node { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-top: 10px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .node-title { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .task-list { margin-left: 20px; border-left: 2px solid #333; padding-left: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn-del { 
            background: #2a1010; color: var(--error); border: 1px solid var(--error); 
            padding: 5px 12px; font-size: 10px; border-radius: 4px; cursor: pointer; 
            font-weight: bold; transition: 0.2s;
        }
        .btn-del:hover { background: var(--error); color: white; }

        .field-row { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 8px; }
        .input-wrap { flex: 1; min-width: 0; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { background: #000; border: 1px solid #333; color: var(--success); padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .sprite-preview { width: 115px; height: 115px; background: #000; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        #log { height: 80px; background: #000; color: #555; font-size: 11px; padding: 10px; border-top: 1px solid var(--border); overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; color: var(--accent); letter-spacing: 2px;">BTD5 <span style="color:white">GRAPHIC COMPILER</span></div>
    <div style="display:flex; gap:10px">
        <input type="file" id="fileIn" style="display:none" accept=".json,.weapon">
        <button class="btn" style="background:white; color:black; padding: 8px 18px; cursor:pointer; font-weight:bold; border:none; border-radius:4px;" onclick="document.getElementById('fileIn').click()">LOAD FILE</button>
        <button class="btn" style="background:var(--success); color:black; padding: 8px 18px; cursor:pointer; font-weight:bold; border:none; border-radius:4px;" onclick="exportJSON()">SAVE .JSON</button>
    </div>
</div>

<div id="editor-pane"></div>
<div id="log">> System Active. Enhanced Juggernaut & .JSON matching ready.</div>

        {name:"tribal_turtle_spear",x:528,y:228,w:36,h:120,aw:36,ah:120},
        {name:"whirlwind",x:332,y:2,w:233,h:222,aw:233,ah:222},
        {name:"wizard_lord_phoenix_flame",x:793,y:128,w:76,h:122,aw:76,ah:122}
    ];

    const spriteKeys = ["SpriteFile", "GraphicName", "SpriteName", "Texture", "Projectile", "Weapon"];

    function getBestSprite(name) {
        if (!name || typeof name !== 'string') return null;
        
        // Clean: get filename, strip extensions, and specific BTD5 noise words
        let clean = name.toLowerCase()
                        .split('/')
                        .pop()
                        .replace(".json", "")
                        .replace(".weapon", "")
                        .replace(".png", "")
                        .replace("projectile", "")
                        .replace(/_/g, "")
                        .replace(/\s/g, "");

        // Manual Override Map
        const manualMap = { 
            "juggernaut": "juggernaut_ball_01",
            "whirlwind": "whirlwind",
            "tempesttornado": "tempest_tornado",
            "bomb": "bomb_tower_bomb",
            "apprentice": "intense_magic"
        };

        if (manualMap[clean]) {
            return spriteLibrary.find(s => s.name === manualMap[clean]);
        }

        // Fuzzy search matching
        return spriteLibrary.find(s => {
            let libName = s.name.toLowerCase().replace(/_/g, "");
            return clean.includes(libName) || libName.includes(clean);
        }) || null;
    }

    document.getElementById('fileIn').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                weaponData = JSON.parse(ev.target.result);
                render();
                document.getElementById('log').innerText = `> Loaded: ${e.target.files[0].name}`;
            } catch(e) {
                document.getElementById('log').innerText = `> ERROR: Invalid JSON format.`;
            }
        };
        reader.readAsText(e.target.files[0]);
    });

    function render() {
        const pane = document.getElementById('editor-pane');
        pane.innerHTML = '';
        if (weaponData) build(weaponData, pane);
    }

    function build(obj, parent) {
        for (let key in obj) {
            const val = obj[key];
            const node = document.createElement('div');
            node.className = 'node';

            if (Array.isArray(val)) {
                node.innerHTML = `<div class="node-header"><span class="node-title">${key}</span></div>`;
                const list = document.createElement('div');
                list.className = 'task-list';
                val.forEach((item, i) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'node';
                    const header = document.createElement('div');
                    header.className = 'node-header';
                    header.innerHTML = `<span class="node-title" style="color:#666">Item #${i+1}</span>`;
                    const del = document.createElement('button');
                    del.className = 'btn-del'; del.innerText = 'REMOVE';
                    del.onclick = (e) => { e.stopPropagation(); val.splice(i, 1); render(); };
                    header.appendChild(del);
                    wrap.appendChild(header);
                    if (typeof item === 'object' && item !== null) build(item, wrap);
                    else createInput(item, (v) => val[i] = v, wrap, `Value`);
                    list.appendChild(wrap);
                });
                node.appendChild(list);
            } else if (typeof val === 'object' && val !== null) {
                node.innerHTML = `<div class="node-header"><span class="node-title">${key}</span></div>`;
                build(val, node);
            } else {
                createInput(val, (v) => obj[key] = v, node, key);
            }
            parent.appendChild(node);
        }
    }

    function createInput(init, update, parent, label) {
        const row = document.createElement('div');
        row.className = 'field-row';
        const wrap = document.createElement('div');
        wrap.className = 'input-wrap';
        wrap.innerHTML = `<label>${label}</label>`;
        const input = document.createElement('input');
        input.value = init;
        input.onchange = (e) => {
            let v = e.target.value;
            if(v === "true") v = true; 
            else if(v === "false") v = false;
            else if(!isNaN(v) && v.trim() !== "") v = parseFloat(v);
            update(v);
            if(spriteKeys.includes(label)) render();
        };
        wrap.appendChild(input);
        row.appendChild(wrap);

        if(spriteKeys.includes(label)) {
            const preview = document.createElement('div');
            preview.className = 'sprite-preview';
            const canv = document.createElement('canvas');
            canv.width = 115; canv.height = 115;
            preview.appendChild(canv);
            row.appendChild(preview);
            updateCanvas(canv, init);
        }
        parent.appendChild(row);
    }

    function updateCanvas(canv, name) {
        const spr = getBestSprite(name);
        if (!spr || !spriteSheet.complete) return;
        const ctx = canv.getContext('2d');
        const ratio = Math.min(115/spr.aw, 115/spr.ah) * 0.9;
        ctx.clearRect(0,0,115,115);
        ctx.drawImage(spriteSheet, spr.x, spr.y, spr.w, spr.h, (115 - spr.aw*ratio)/2, (115 - spr.ah*ratio)/2, spr.aw*ratio, spr.ah*ratio);
    }

    function exportJSON() {
        if(!weaponData) return;
        const blob = new Blob([JSON.stringify(weaponData, null, 4)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "BTD5_Arsenal_Export.json";
        a.click();
    }
</script>
