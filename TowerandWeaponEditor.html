<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTD5 Weapon Master - Green Assassin HD Fix</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #00d4ff; --text: #e0e0e0; --success: #00ff88; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: #000; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; justify-content: space-between; }
        .toolbar { background: #0a0a0a; padding: 5px 20px; border-bottom: 1px solid #1a1a1a; display: flex; gap: 10px; align-items: center; }
        
        #editor-pane { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        
        .node { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-top: 10px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .node-title { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .task-list { margin-left: 20px; border-left: 2px solid #333; padding-left: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn { padding: 8px 14px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-bezier { background: #facc15; color: black; margin-left: 10px; }

        .field-row { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 8px; }
        .input-wrap { flex: 1; min-width: 0; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { background: #000; border: 1px solid #333; color: var(--success); padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; outline: none; }
        
        /* SPRITE PREVIEW BOX FIX */
        .sprite-preview { width: 115px; height: 115px; background: #000; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; padding: 5px; box-sizing: border-box; }
        .sprite-preview img { width: 100%; height: 100%; object-fit: contain; display: block; }
        
        #bezier-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 600px; background: #111; border: 2px solid var(--accent); border-radius: 12px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .bezier-header { background: var(--accent); color: black; padding: 12px; font-size: 11px; font-weight: 900; display: flex; justify-content: space-between; border-radius: 10px 10px 0 0; }
        .bezier-tools { background: #1a1a1a; padding: 10px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #333; }
        #bezier-canvas { background: #000; cursor: crosshair; flex: 1; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; color: var(--accent); letter-spacing: 2px;">BTD5 <span style="color:white">WEAPON MASTER</span></div>
    <div style="display:flex; gap:10px">
        <input type="file" id="fileIn" style="display:none" accept=".json">
        <button class="btn" style="background:white; color:black;" onclick="document.getElementById('fileIn').click()">LOAD .JSON</button>
        <button class="btn" style="background:var(--success); color:black;" onclick="exportJSON()">EXPORT .JSON</button>
    </div>
</div>

<div class="toolbar">
    <button class="btn" style="background: #6366f1; color: white;" onclick="saveSession()">SAVE (.SAV)</button>
    <input type="file" id="stateIn" style="display:none" accept=".sav">
    <button class="btn" style="background: #4b5563; color: white;" onclick="document.getElementById('stateIn').click()">LOAD (.SAV)</button>
</div>

<div id="editor-pane"></div>

<div id="bezier-container">
    <div class="bezier-header"><span>BEZIER PATH ENGINE</span><span style="cursor:pointer" onclick="closeBezier()">✕</span></div>
    <div class="bezier-tools">
        <label style="color:white">ZOOM</label>
        <input type="range" id="bezier-zoom" min="0.5" max="5" step="0.1" value="1" oninput="drawBezier()">
        <span style="font-size: 9px; color: #888;">SHIFT + CLICK TO PAN</span>
    </div>
    <canvas id="bezier-canvas" width="500" height="400"></canvas>
    <div style="padding:10px; font-size:10px; color:#555; text-align:center;">Drag points to edit. Shift+Drag to Pan.</div>
</div>

        {name:"supermonkey_plasma_vision_projectile",x:2,y:670,w:98,h:110,aw:98,ah:110},

        {name:"tempest_tornado",x:2,y:2,w:326,h:310,aw:326,ah:310},
        {name:"track_glue",x:775,y:362,w:86,h:101,aw:86,ah:101},
        {name:"tribal_turtle_coconut",x:833,y:819,w:42,h:63,aw:42,ah:63},
        {name:"tribal_turtle_spear",x:528,y:228,w:36,h:120,aw:36,ah:120},
        {name:"whirlwind",x:332,y:2,w:233,h:222,aw:233,ah:222},
        {name:"wizard_lord_phoenix_flame",x:793,y:128,w:76,h:122,aw:76,ah:122}
    ];

    function getBestSprite(name) {
        if (!name) return null;
        const clean = name.toLowerCase();
        
        // --- HARD OVERRIDE FOR BOMB TOWER GREEN ASSASSIN ---
        if (currentFileName === "BombTowerGreenAssassin.json" || clean.includes("moabassassin")) {
            return { isHD: true, url: GREEN_ASSASSIN_URL };
        }

        const match = spriteLibrary.find(s => clean.includes(s.name.replace(/_/g, "")));
        return match || null;
    }

    function updatePreview(container, name) {
        container.innerHTML = '';
        const spr = getBestSprite(name);
        if (!spr) return;

        if (spr.isHD) {
            const img = new Image();
            img.src = spr.url;
            img.onload = () => { img.style.opacity = "1"; };
            container.appendChild(img);
        } else {
            const canv = document.createElement('canvas');
            canv.width = 115; canv.height = 115;
            const ctx = canv.getContext('2d');
            const ratio = Math.min(105/spr.aw, 105/spr.ah);
            ctx.drawImage(spriteSheet, spr.x, spr.y, spr.aw, spr.ah, (115 - spr.aw*ratio)/2, (115 - spr.ah*ratio)/2, spr.aw*ratio, spr.ah*ratio);
            container.appendChild(canv);
        }
    }

    function buildUI(obj, parent, path = "") {
        for (let key in obj) {
            const val = obj[key], currentPath = path ? `${path}.${key}` : key;
            const node = document.createElement('div'); node.className = 'node';
            if (Array.isArray(val)) {
                node.innerHTML = `<div class="node-header"><span class="node-title">${key}</span>${key === "Curves" ? `<button class="btn btn-bezier" onclick="openBezier('${currentPath}')">EDIT PATH</button>` : ''}</div>`;
                const list = document.createElement('div'); list.className = 'task-list';
                val.forEach((v, i) => {
                    const wrap = document.createElement('div'); wrap.className = 'node';
                    if (typeof v === 'object' && v !== null) buildUI(v, wrap, `${currentPath}.${i}`);
                    else createInput(v, (newVal) => val[i] = newVal, wrap, `Value`, `${currentPath}.${i}`);
                    list.appendChild(wrap);
                });
                node.appendChild(list);
            } else if (typeof val === 'object' && val !== null) {
                node.innerHTML = `<div class="node-header"><span class="node-title">${key}</span></div>`;
                buildUI(val, node, currentPath);
            } else {
                createInput(val, (v) => obj[key] = v, node, key, currentPath);
            }
            parent.appendChild(node);
        }
    }

    function createInput(init, update, parent, label, path) {
        const row = document.createElement('div'); row.className = 'field-row';
        const wrap = document.createElement('div'); wrap.className = 'input-wrap';
        wrap.innerHTML = `<label>${label}</label>`;
        const input = document.createElement('input'); input.value = init;
        input.onchange = (e) => { 
            let v = e.target.value; update(isNaN(v) || v === "" ? v : parseFloat(v)); 
            if(["SpriteFile", "GraphicName", "ProjectileFile", "Texture"].includes(label)) render();
        };
        wrap.appendChild(input); row.appendChild(wrap);
        if(["SpriteFile", "GraphicName", "ProjectileFile", "Texture"].includes(label)) {
            const preview = document.createElement('div'); preview.className = 'sprite-preview';
            row.appendChild(preview); updatePreview(preview, init);
        }
        parent.appendChild(row);
    }

    function openBezier(path) {
        activeCurveRef = path.split('.').reduce((o, i) => o[i], weaponData);
        document.getElementById('bezier-container').style.display = 'flex';
        bOffset = { x: 250, y: 200 };
        drawBezier();
    }
    function closeBezier() { document.getElementById('bezier-container').style.display = 'none'; }

    function drawBezier() {
        const canv = document.getElementById('bezier-canvas');
        const ctx = canv.getContext('2d');
        bZoom = parseFloat(document.getElementById('bezier-zoom').value);
        ctx.clearRect(0, 0, canv.width, canv.height);
        ctx.strokeStyle = '#222'; ctx.beginPath();
        for(let i=0; i<canv.width; i+=50*bZoom) { ctx.moveTo(i+bOffset.x%(50*bZoom),0); ctx.lineTo(i+bOffset.x%(50*bZoom),canv.height); }
        for(let i=0; i<canv.height; i+=50*bZoom) { ctx.moveTo(0,i+bOffset.y%(50*bZoom)); ctx.lineTo(canv.width,i+bOffset.y%(50*bZoom)); }
        ctx.stroke();
        if(!activeCurveRef) return;
        ctx.strokeStyle = varProp('--accent'); ctx.lineWidth = 2; ctx.beginPath();
        activeCurveRef.forEach((p, i) => {
            const x = p[0] * bZoom + bOffset.x, y = p[1] * bZoom + bOffset.y;
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.stroke();
        activeCurveRef.forEach((p, i) => {
            const x = p[0] * bZoom + bOffset.x, y = p[1] * bZoom + bOffset.y;
            ctx.fillStyle = (draggingPoint === i) ? '#fff' : varProp('--accent');
            ctx.fillRect(x-4, y-4, 8, 8);
        });
    }

    const bCanv = document.getElementById('bezier-canvas');
    bCanv.onmousedown = (e) => {
        const rect = bCanv.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        if(e.shiftKey) { isPanning = true; return; }
        activeCurveRef.forEach((p, i) => {
            if(Math.hypot(mx-(p[0]*bZoom+bOffset.x), my-(p[1]*bZoom+bOffset.y)) < 15) draggingPoint = i;
        });
    };
    window.onmousemove = (e) => {
        if(isPanning) { bOffset.x += e.movementX; bOffset.y += e.movementY; drawBezier(); return; }
        if(draggingPoint === null) return;
        const rect = bCanv.getBoundingClientRect();
        activeCurveRef[draggingPoint][0] = (e.clientX - rect.left - bOffset.x) / bZoom;
        activeCurveRef[draggingPoint][1] = (e.clientY - rect.top - bOffset.y) / bZoom;
        drawBezier();
    };
    window.onmouseup = () => { draggingPoint = null; isPanning = false; };

    function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function render() { const p = document.getElementById('editor-pane'); p.innerHTML = ''; if(weaponData) buildUI(weaponData, p); }
    function exportJSON() { const blob = new Blob([JSON.stringify(weaponData, null, "\t")], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = currentFileName || "Weapon.json"; a.click(); }
    function saveSession() { const blob = new Blob([JSON.stringify({data: weaponData, name: currentFileName})], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Session.sav"; a.click(); }

    document.getElementById('fileIn').onchange = (e) => {
        const file = e.target.files[0]; currentFileName = file.name;
        const reader = new FileReader(); reader.onload = (ev) => { weaponData = JSON.parse(ev.target.result); render(); }; reader.readAsText(file);
    };
    document.getElementById('stateIn').onchange = (e) => {
        const reader = new FileReader(); reader.onload = (ev) => { const session = JSON.parse(ev.target.result); weaponData = session.data; currentFileName = session.name; render(); }; reader.readAsText(e.target.files[0]);
    };
</script>
</body>
</html>
