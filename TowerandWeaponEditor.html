<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTD5 Advanced Architect</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #ff9800; --text: #e0e0e0; --danger: #ff4444; --success: #4CAF50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        .controls { position: sticky; top: 0; background: var(--bg); padding: 15px; z-index: 1000; border-bottom: 2px solid #333; display: flex; gap: 10px; align-items: center; }
        
        .edit-box { 
            background: var(--card); padding: 15px; border-radius: 6px; border: 1px solid #333; 
            margin-top: 10px; position: relative;
        }

        .nested-container { margin-left: 20px; padding-left: 10px; border-left: 2px solid var(--accent); }

        .field-group { margin-bottom: 8px; }
        label { display: block; font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        
        input, select { 
            background: #000; border: 1px solid #444; color: #0f0; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box;
        }

        /* Add/Remove Buttons */
        .btn-add { background: var(--success); color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-top: 5px; }
        .btn-remove { 
            background: var(--danger); color: white; border: none; border-radius: 4px; 
            cursor: pointer; position: absolute; right: 10px; top: 10px; padding: 2px 8px; 
        }

        .task-header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 5px; border-radius: 4px; margin-bottom: 10px; }
        .filename { font-family: monospace; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <input type="file" id="fileInput" style="display:none" accept=".weapon,.tower,.json">
        <button onclick="document.getElementById('fileInput').click()" style="padding:10px; cursor:pointer;">📂 Open File</button>
        <button onclick="downloadJSON()" style="padding:10px; cursor:pointer; background:var(--success); color:white; border:none; border-radius:4px;">💾 Save File</button>
        <span class="filename" id="fileNameDisplay">No file selected</span>
    </div>

    <div id="editor"></div>
</div>

<script>
    let currentData = {};
    let currentFileName = "mod.weapon";

    // Templates for adding new tasks
    const templates = {
        "Tasks": { "Type": "Damage", "DamageType": "Sharp", "Amount": 1 },
        "DefaultWeapons": "Dart.weapon"
    };

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        document.getElementById('fileNameDisplay').innerText = currentFileName;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                currentData = JSON.parse(e.target.result);
                render();
            } catch (err) { alert("Invalid JSON file."); }
        };
        reader.readAsText(file);
    });

    function render() {
        const editor = document.getElementById('editor');
        editor.innerHTML = '';
        renderRecursive(currentData, editor);
    }

    function renderRecursive(obj, parentElement) {
        for (const key in obj) {
            const val = obj[key];
            const wrapper = document.createElement('div');
            wrapper.className = 'field-group';

            if (Array.isArray(val)) {
                // ARRAY SECTION (Tasks, Weapons, etc.)
                wrapper.innerHTML = `<label>${key}</label>`;
                const container = document.createElement('div');
                container.className = 'nested-container';
                
                val.forEach((item, index) => {
                    const itemBox = document.createElement('div');
                    itemBox.className = 'edit-box';
                    
                    // Remove Button
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn-remove';
                    delBtn.innerText = '×';
                    delBtn.onclick = () => { val.splice(index, 1); render(); };
                    itemBox.appendChild(delBtn);

                    if (typeof item === 'object') {
                        renderRecursive(item, itemBox);
                    } else {
                        const input = document.createElement('input');
                        input.value = item;
                        input.oninput = (e) => { val[index] = e.target.value; };
                        itemBox.appendChild(input);
                    }
                    container.appendChild(itemBox);
                });

                // Add Button
                const addBtn = document.createElement('button');
                addBtn.className = 'btn-add';
                addBtn.innerText = `+ Add to ${key}`;
                addBtn.onclick = () => {
                    const template = templates[key] || (typeof val[0] === 'object' ? {} : "");
                    val.push(JSON.parse(JSON.stringify(template)));
                    render();
                };
                
                wrapper.appendChild(container);
                wrapper.appendChild(addBtn);
            } 
            else if (typeof val === 'object' && val !== null) {
                // OBJECT SECTION
                wrapper.innerHTML = `<label>${key}</label>`;
                const container = document.createElement('div');
                container.className = 'edit-box';
                renderRecursive(val, container);
                wrapper.appendChild(container);
            } 
            else {
                // SIMPLE VALUES
                const label = document.createElement('label');
                label.innerText = key;
                wrapper.appendChild(label);

                const input = document.createElement('input');
                if (typeof val === 'number') {
                    input.type = 'number';
                    input.step = 'any';
                    input.oninput = (e) => { obj[key] = parseFloat(e.target.value); };
                } else if (typeof val === 'boolean') {
                    const sel = document.createElement('select');
                    sel.innerHTML = `<option value="true" ${val ? 'selected' : ''}>True</option>
                                     <option value="false" ${!val ? 'selected' : ''}>False</option>`;
                    sel.onchange = (e) => { obj[key] = e.target.value === 'true'; };
                    wrapper.appendChild(sel);
                    parentElement.appendChild(wrapper);
                    continue;
                } else {
                    input.oninput = (e) => { obj[key] = e.target.value; };
                }
                input.value = val;
                wrapper.appendChild(input);
            }
            parentElement.appendChild(wrapper);
        }
    }

    function downloadJSON() {
        const dataStr = JSON.stringify(currentData, null, "\t");
        const blob = new Blob([dataStr], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = currentFileName;
        link.click();
    }
</script>
</body>
</html>
