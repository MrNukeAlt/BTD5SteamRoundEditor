<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTD5 Logic Architect - Projectile Fix Applied</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #00d4ff; --text: #e0e0e0; --success: #00ff88; --error: #ff4d4d; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #000; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; justify-content: space-between; }
        #editor-container { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 10px; }
        .node { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-top: 5px; position: relative; }
        .node-title { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .task-list { margin-left: 20px; border-left: 1px solid #333; padding-left: 15px; display: flex; flex-direction: column; gap: 8px; }
        .field-row { display: flex; align-items: center; gap: 15px; }
        .input-wrap { flex: 1; }
        input { background: #000; border: 1px solid #333; color: var(--success); padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; }
        .sprite-preview { width: 85px; height: 85px; background: #000; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        #log { height: 80px; background: #000; color: #aaa; font-size: 11px; padding: 10px; border-top: 1px solid var(--border); overflow-y: auto; }
        .log-ok { color: var(--success); }
    </style>
</head>
<body>

    <div style="font-weight: 900; color: var(--accent);">BTD5 <span style="color:white">PROJECTILE PATCHER</span></div>
    <div style="display:flex; gap:10px">
        <input type="file" id="fileIn" style="display:none" accept=".json,.weapon">
        <button class="btn" style="background:white; color:black" onclick="document.getElementById('fileIn').click()">📂 Load Weapon</button>
        <button class="btn" style="background:var(--success); color:black" onclick="exportJSON()">💾 Export & Verify</button>
    </div>
</div>

<div id="editor-container"></div>
<div id="log">Patch 1.0.4: Specific Projectile Mappings Loaded.</div>

    // Re-mapped Sprite Data (Consolidated from provided XML)
    const spriteLibrary = [

        {name:"engineer_foam",x:965,y:77,w:30,h:76,aw:30,ah:76}, {name:"engineer_nail",x:982,y:235,w:9,h:38,aw:9,ah:38}, {name:"evil_monkey_temple_projectile",x:332,y:228,w:192,h:183,aw:192,ah:183},

        {name:"glue_gunner_glue_green",x:897,y:214,w:21,h:48,aw:21,ah:48}, {name:"glue_gunner_glue_yellow",x:957,y:235,w:21,h:48,aw:21,ah:48}, {name:"grape",x:891,y:266,w:28,h:35,aw:28,ah:35},
        {name:"grilled_pineapple",x:441,y:522,w:105,h:152,aw:105,ah:152}, {name:"helicopter_missile",x:587,y:678,w:40,h:67,aw:40,ah:67}, {name:"hot_tacks",x:124,y:620,w:122,h:91,aw:122,ah:91},
        {name:"ice_shard",x:873,y:165,w:20,h:80,aw:20,ah:80}, {name:"intense_magic",x:250,y:696,w:100,h:100,aw:100,ah:100}, {name:"juggernaut_ball_01",x:528,y:378,w:140,h:140,aw:140,ah:140},
        {name:"meerkat_pro_laser",x:929,y:209,w:24,h:53,aw:24,ah:53}, {name:"mm_box",x:133,y:478,w:133,h:138,aw:148,ah:148}, {name:"mm_bundle",x:775,y:279,w:112,h:79,aw:112,ah:79},
        {name:"mm_wad",x:104,y:715,w:114,h:74,aw:114,ah:74}, {name:"monkey_apprentice_dragon_breath",x:793,y:2,w:76,h:122,aw:59,ah:115}, {name:"monkey_apprentice_fireball",x:845,y:589,w:48,h:80,aw:48,ah:80},
        {name:"monkey_apprentice_lightning",x:354,y:788,w:207,h:30,aw:207,ah:30}, {name:"monkey_farmer_pro_banana",x:176,y:800,w:106,h:54,aw:106,ah:54}, {name:"monkey_temple_bomb_tower_projectile",x:693,y:757,w:60,h:118,aw:60,ah:118},
        {name:"monkey_temple_glue_tower_projectile",x:873,y:2,w:34,h:76,aw:34,ah:76}, {name:"monkey_temple_ice_tower_projectile",x:774,y:467,w:72,h:118,aw:72,ah:118}, {name:"monkey_temple_main_projectile",x:133,y:316,w:164,h:158,aw:164,ah:158},
        {name:"monkey_temple_supermonkey_projectile",x:286,y:822,w:72,h:72,aw:72,ah:72}, {name:"mortar_big_one_bomb",x:379,y:586,w:52,h:81,aw:52,ah:81}, {name:"navy_harpoon",x:525,y:832,w:82,h:54,aw:82,ah:54},
        {name:"ninja_throwing_star",x:911,y:77,w:50,h:50,aw:50,ah:50}, {name:"pineapple",x:550,y:522,w:105,h:152,aw:105,ah:152}, {name:"pop_and_awe_bomb",x:2,y:316,w:127,h:215,aw:127,ah:215},
        {name:"Seeking_bolt",x:691,y:134,w:91,h:141,aw:91,ah:141}, {name:"spectre_mortar_bomb",x:957,y:2,w:36,h:71,aw:36,ah:71}, {name:"spiked_ball",x:270,y:586,w:105,h:106,aw:105,ah:106},
        {name:"spiked_mine",x:659,y:552,w:105,h:106,aw:105,ah:106}, {name:"spikeopult_ball",x:845,y:673,w:52,h:52,aw:52,ah:52}, {name:"submarine_bmissile",x:785,y:589,w:56,h:146,aw:80,ah:149},
        {name:"submarine_dart",x:901,y:131,w:24,h:79,aw:24,ah:79}, {name:"submarine_first_strike_missile",x:569,y:2,w:106,h:197,aw:106,ah:197}, {name:"supermonkey_laser_vision_projectile",x:757,y:819,w:72,h:74,aw:72,ah:74},
        {name:"supermonkey_laser_vision_projectile_single",x:970,y:157,w:24,h:74,aw:24,ah:74}, {name:"supermonkey_plasma_vision_projectile",x:2,y:670,w:98,h:110,aw:98,ah:110}, {name:"supermonkey_sun_god_projectile",x:82,y:793,w:90,h:64,aw:90,ah:64},
        {name:"supermonkey_tech_terror_projectile",x:2,y:535,w:118,h:131,aw:118,ah:131}, {name:"tacks",x:659,y:662,w:122,h:91,aw:122,ah:91}, {name:"tack_shooter_tack",x:950,y:287,w:18,h:46,aw:18,ah:46},
        {name:"tempest_tornado",x:2,y:2,w:326,h:310,aw:326,ah:310}, {name:"track_glue",x:775,y:362,w:86,h:101,aw:86,ah:101}, {name:"tribal_turtle_coconut",x:833,y:819,w:42,h:63,aw:42,ah:63},
        {name:"tribal_turtle_spear",x:528,y:228,w:36,h:120,aw:36,ah:120}, {name:"whirlwind",x:332,y:2,w:233,h:222,aw:233,ah:222}, {name:"wizard_lord_phoenix_flame",x:793,y:128,w:76,h:122,aw:76,ah:122}
    ];

    function getBestSprite(name) {
        if (!name) return null;
        let clean = name.toLowerCase().replace(".json", "");
        
        // --- FIX: Mapping Table for Requested Projectiles ---
        const lookup = {
            "tempesttornadoprojectile": "tempest_tornado",
            "apprentice_seeking_bolt": "Seeking_bolt",
            "apprentice_projectile": "intense_magic",
            "bombtowergreenassassin": "bomb_tower_special_ability_projectile",
            "bombtowermaulerprojectile": "bomb_tower_moab_mauler",
            "spikedmines": "spiked_mine",
            "spikedballs": "spiked_ball"
        };

        if (lookup[clean]) return spriteLibrary.find(s => s.name === lookup[clean]);

        // Generic fallback check
        return spriteLibrary.find(s => clean === s.name.toLowerCase() || clean.includes(s.name.toLowerCase())) || null;
    }

    // --- Core UI & Render Logic ---
    document.getElementById('fileIn').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                weaponData = JSON.parse(ev.target.result);
                renderAll();
                pushLog(`Loaded ${file.name}. Specific projectile patches applied.`, 'log-ok');
            } catch (err) { pushLog("ERROR: Invalid JSON file.", "log-err"); }
        };
        reader.readAsText(file);
    });

    function renderAll() {
        const container = document.getElementById('editor-container');
        container.innerHTML = '';
        if (weaponData) buildTree(weaponData, container);
    }

    function buildTree(obj, parentElement) {
        for (let key in obj) {
            const val = obj[key];
            const node = document.createElement('div');
            node.className = 'node';

            if (Array.isArray(val)) {
                node.innerHTML = `<span class="node-title">${key}</span>`;
                const list = document.createElement('div');
                list.className = 'task-list';
                val.forEach((item, index) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'node';
                    wrap.innerHTML = `<button class="btn" style="background:#333; color:#ff4d4d; position:absolute; right:5px; top:5px" onclick="removeAt('${key}', ${index})">×</button>`;
                    (typeof item === 'object' && item !== null) ? buildTree(item, wrap) : createInput(item, (nv) => { val[index]=nv; }, wrap, `Item ${index}`);
                    list.appendChild(wrap);
                });
                node.appendChild(list);
                const add = document.createElement('button');
                add.className = 'btn'; add.style.background = "var(--success)"; add.style.color = "black"; add.style.marginTop = "10px";
                add.innerText = `+ Add to ${key}`;
                add.onclick = () => { val.push(typeof val[0] === 'object' ? { "Type": "Effect" } : ""); renderAll(); };
                node.appendChild(add);
            } else if (typeof val === 'object' && val !== null) {
                node.innerHTML = `<span class="node-title">${key}</span>`;
                buildTree(val, node);
            } else {
                createInput(val, (nv) => { obj[key] = nv; }, node, key);
            }
            parentElement.appendChild(node);
        }
    }

    function createInput(initialValue, onUpdate, parent, labelText) {
        const row = document.createElement('div');
        row.className = 'field-row';
        const wrap = document.createElement('div');
        wrap.className = 'input-wrap';
        wrap.innerHTML = `<label style="font-size:10px; color:#888;">${labelText}</label>`;
        const input = document.createElement('input');
        input.value = initialValue;

        input.onchange = (e) => {
            let v = e.target.value;
            if (v === "true") v = true; else if (v === "false") v = false;
            else if (!isNaN(v) && v.trim() !== "") v = parseFloat(v);
            onUpdate(v);
            if (["SpriteFile", "GraphicName", "SpriteName", "Texture", "Sprite"].includes(labelText)) renderAll();
        };

        wrap.appendChild(input);
        row.appendChild(wrap);

        // Render Patch logic
        if (["SpriteFile", "GraphicName", "SpriteName", "Texture", "Sprite"].includes(labelText)) {
            const preview = document.createElement('div');
            preview.className = 'sprite-preview';
            const canv = document.createElement('canvas');
            canv.width = 85; canv.height = 85;
            preview.appendChild(canv);
            row.appendChild(preview);
            updatePreview(canv, initialValue);
        }
        parent.appendChild(row);
    }

    function updatePreview(canv, name) {
        const spr = getBestSprite(name);
        if (!spr || !spriteSheet.complete) return;
        const ctx = canv.getContext('2d');
        const ratio = Math.min(85/spr.aw, 85/spr.ah) * 0.95;
        ctx.clearRect(0,0,85,85);
        ctx.drawImage(spriteSheet, spr.x, spr.y, spr.w, spr.h, (85 - spr.aw*ratio)/2, (85 - spr.ah*ratio)/2, spr.aw*ratio, spr.ah*ratio);
    }

    function removeAt(key, index) {
        const f = (t) => {
            if (t[key] && Array.isArray(t[key])) { t[key].splice(index, 1); return true; }
            for (let k in t) if (typeof t[k] === 'object' && t[k] !== null) if (f(t[k])) return true;
        };
        f(weaponData); renderAll();
    }

    function exportJSON() {
        const data = JSON.stringify(weaponData, null, 4);
        const blob = new Blob([data], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = "BTD5_Fixed.json";
        a.click();
        pushLog("Exported Successfully. JSON Validated.", "log-ok");
    }

    function pushLog(m, c) { document.getElementById('log').innerHTML += `<div class="${c}">${m}</div>`; }
</script>
</body>
</html>
