<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTD5 Weapon Master - Professional Suite</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #00d4ff; --text: #e0e0e0; --success: #00ff88; --error: #ff4d4d; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .header { background: #000; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 15px; align-items: center; justify-content: space-between; }
        .toolbar { background: #0a0a0a; padding: 5px 20px; border-bottom: 1px solid #1a1a1a; display: flex; gap: 10px; align-items: center; }
        
        #editor-pane { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        
        .node { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-top: 10px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .node-title { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        .task-list { margin-left: 20px; border-left: 2px solid #333; padding-left: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn { padding: 8px 14px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; transition: 0.2s; }
        .btn-bezier { background: #facc15; color: black; margin-left: 10px; box-shadow: 0 0 10px rgba(250, 204, 21, 0.4); }
        .btn-del { background: #2a1010; color: var(--error); border: 1px solid var(--error); padding: 5px 12px; font-size: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save-state { background: #6366f1; color: white; }
        .btn-load-state { background: #4b5563; color: white; }

        .field-row { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 8px; }
        .input-wrap { flex: 1; min-width: 0; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input { background: #000; border: 1px solid #333; color: var(--success); padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; outline: none; }
        
        #bezier-container { 
            position: fixed; top: 100px; right: 20px; width: 340px; height: 420px; 
            background: #111; border: 2px solid var(--accent); border-radius: 12px; 
            display: none; flex-direction: column; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .bezier-header { background: var(--accent); color: black; padding: 10px; font-size: 11px; font-weight: 900; display: flex; justify-content: space-between; border-radius: 10px 10px 0 0; }
        #bezier-canvas { background: #000; cursor: crosshair; flex: 1; margin: 10px; border: 1px solid #333; border-radius: 4px; }
        
        .sprite-preview { width: 115px; height: 115px; background: #000; border: 1px solid #444; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        #log { height: 60px; background: #000; color: #555; font-size: 11px; padding: 10px; border-top: 1px solid var(--border); overflow-y: auto; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; color: var(--accent); letter-spacing: 2px;">BTD5 <span style="color:white">WEAPON MASTER</span></div>
    <div style="display:flex; gap:10px">
        <input type="file" id="fileIn" style="display:none" accept=".json,.weapon">
        <button class="btn" style="background:white; color:black;" onclick="document.getElementById('fileIn').click()">LOAD .JSON</button>
        <button class="btn" style="background:var(--success); color:black;" onclick="exportJSON()">EXPORT FINAL .JSON</button>
    </div>
</div>

<div class="toolbar">
    <span style="font-size: 10px; color: #444; font-weight: bold; margin-right: 10px;">SESSION CONTROL:</span>
    <button class="btn btn-save-state" onclick="saveSession()">DOWNLOAD PROGRESS (.SAV)</button>
    <input type="file" id="stateIn" style="display:none" accept=".sav">
    <button class="btn btn-load-state" onclick="document.getElementById('stateIn').click()">RELOAD PROGRESS</button>
</div>

<div id="editor-pane"></div>

<div id="bezier-container">
    <div class="bezier-header">
        <span>LIVE BEZIER EDITOR</span>
        <span style="cursor:pointer" onclick="closeBezier()">✕</span>
    </div>
    <canvas id="bezier-canvas" width="320" height="320"></canvas>
    <div style="padding: 10px; font-size: 9px; color: #666; text-align: center;">DRAG NODES TO UPDATE MOTION CURVE</div>
</div>

<div id="log">> System Standby... Import/Export Session System Online.</div>

<script>
    let weaponData = null;
    let activeCurveRef = null;

    const SCALE = 1.2;

        {name:"supermonkey_laser_vision_projectile_single",x:970,y:157,w:24,h:74,aw:24,ah:74},
        {name:"supermonkey_plasma_vision_projectile",x:2,y:670,w:98,h:110,aw:98,ah:110},
        {name:"supermonkey_sun_god_projectile",x:82,y:793,w:90,h:64,aw:90,ah:64},
        {name:"supermonkey_tech_terror_projectile",x:2,y:535,w:118,h:131,aw:118,ah:131},
        {name:"tacks",x:659,y:662,w:122,h:91,aw:122,ah:91},
        {name:"tack_shooter_tack",x:950,y:287,w:18,h:46,aw:18,ah:46},
        {name:"tempest_tornado",x:2,y:2,w:326,h:310,aw:326,ah:310},
        {name:"track_glue",x:775,y:362,w:86,h:101,aw:86,ah:101},
        {name:"tribal_turtle_coconut",x:833,y:819,w:42,h:63,aw:42,ah:63},
        {name:"tribal_turtle_spear",x:528,y:228,w:36,h:120,aw:36,ah:120},
        {name:"whirlwind",x:332,y:2,w:233,h:222,aw:233,ah:222},
        {name:"wizard_lord_phoenix_flame",x:793,y:128,w:76,h:122,aw:76,ah:122}
    ];

    function getBestSprite(name) {
        if (!name || typeof name !== 'string') return null;
        let clean = name.toLowerCase().split('/').pop().replace(".json", "").replace(".weapon", "").replace(".png", "").replace(/_/g, "").replace(/\s/g, "");
        if (clean.includes("juggernaut")) return spriteLibrary.find(s => s.name === "juggernaut_ball_01");
        if (clean.includes("apprenticeprojectile")) return spriteLibrary.find(s => s.name === "intense_magic");
        const manualMap = { "bombtowergreenassassin": "bomb_tower_special_ability_projectile", "bombtowermauler": "bomb_tower_moab_mauler", "whirlwind": "whirlwind", "bomb": "bomb_tower_bomb" };
        if (manualMap[clean]) return spriteLibrary.find(s => s.name === manualMap[clean]);
        return spriteLibrary.find(s => {
            let libName = s.name.toLowerCase().replace(/_/g, "");
            return clean.includes(libName) || libName.includes(clean);
        }) || null;
    }

    // --- BEZIER ENGINE ---
    let draggingNode = null; 
    const bCanvas = document.getElementById('bezier-canvas');
    const bCtx = bCanvas.getContext('2d');

    function openBezier(curves) {
        activeCurveRef = curves;
        document.getElementById('bezier-container').style.display = 'flex';
        drawBezier();
    }

    function closeBezier() {
        document.getElementById('bezier-container').style.display = 'none';
        activeCurveRef = null;
    }

    bCanvas.addEventListener('mousedown', e => {
        if (!activeCurveRef) return;
        const rect = bCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        activeCurveRef.forEach((seg, sIdx) => {
            seg.forEach((pt, pIdx) => {
                if (Math.hypot(pt[0] * SCALE + OFFSET - mx, pt[1] * SCALE + OFFSET - my) < 12) draggingNode = { sIdx, pIdx };
            });
        });
    });

    window.addEventListener('mousemove', e => {
        if (!draggingNode || !activeCurveRef) return;
        const rect = bCanvas.getBoundingClientRect();
        activeCurveRef[draggingNode.sIdx][draggingNode.pIdx][0] = parseFloat(((e.clientX - rect.left - OFFSET) / SCALE).toFixed(2));
        activeCurveRef[draggingNode.sIdx][draggingNode.pIdx][1] = parseFloat(((e.clientY - rect.top - OFFSET) / SCALE).toFixed(2));
        drawBezier();
        syncInputs();
    });

    window.addEventListener('mouseup', () => draggingNode = null);

    function drawBezier() {
        if (!activeCurveRef) return;
        bCtx.clearRect(0,0,320,320);
        bCtx.strokeStyle = "#333"; bCtx.beginPath();
        bCtx.moveTo(0, OFFSET); bCtx.lineTo(320, OFFSET); bCtx.moveTo(OFFSET, 0); bCtx.lineTo(OFFSET, 320); bCtx.stroke();
        activeCurveRef.forEach((seg, i) => {
            const p = seg.map(pt => [pt[0] * SCALE + OFFSET, pt[1] * SCALE + OFFSET]);
            bCtx.strokeStyle = i % 2 === 0 ? "var(--accent)" : "var(--success)";
            bCtx.lineWidth = 2; bCtx.beginPath();
            bCtx.moveTo(p[0][0], p[0][1]);
            bCtx.bezierCurveTo(p[1][0], p[1][1], p[2][0], p[2][1], p[3][0], p[3][1]);
            bCtx.stroke();
            p.forEach(pt => { bCtx.fillStyle = "white"; bCtx.beginPath(); bCtx.arc(pt[0], pt[1], 5, 0, Math.PI*2); bCtx.fill(); });
        });
    }

    // --- RECURSIVE BUILDER ---
    function build(obj, parent, path = "") {
        for (let key in obj) {
            const val = obj[key];
            const currentPath = path ? `${path}.${key}` : key;
            const node = document.createElement('div');
            node.className = 'node';
            const isBezier = (key === "Curves" && Array.isArray(val) && val.length > 0 && Array.isArray(val[0]));

            if (Array.isArray(val)) {
                node.innerHTML = `<div class="node-header"><span class="node-title">${key}</span>${isBezier ? `<button class="btn btn-bezier" onclick="openBezier(getObjectByPath('${currentPath}'))">LIVE CURVE EDITOR</button>` : ''}</div>`;
                const list = document.createElement('div');
                list.className = 'task-list';
                val.forEach((item, i) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'node';
                    const header = document.createElement('div');
                    header.className = 'node-header';
                    header.innerHTML = `<span class="node-title" style="color:#666">Item #${i+1}</span>`;
                    const del = document.createElement('button');
                    del.className = 'btn-del'; del.innerText = 'REMOVE';
                    del.onclick = (e) => { e.stopPropagation(); val.splice(i, 1); render(); };
                    header.appendChild(del);
                    wrap.appendChild(header);
                    if (typeof item === 'object' && item !== null) build(item, wrap, `${currentPath}.${i}`);
                    else createInput(item, (v) => val[i] = v, wrap, `Value`, `${currentPath}.${i}`);
                    list.appendChild(wrap);
                });
                node.appendChild(list);
            } else if (typeof val === 'object' && val !== null) {
                node.innerHTML = `<div class="node-header"><span class="node-title">${key}</span></div>`;
                build(val, node, currentPath);
            } else {
                createInput(val, (v) => obj[key] = v, node, key, currentPath);
            }
            parent.appendChild(node);
        }
    }

    const previewKeys = ["SpriteFile", "GraphicName", "Texture", "SpriteName"];

    function createInput(init, update, parent, label, path) {
        const row = document.createElement('div'); row.className = 'field-row';
        const wrap = document.createElement('div'); wrap.className = 'input-wrap';
        wrap.innerHTML = `<label>${label}</label>`;
        const input = document.createElement('input');
        input.value = init;
        input.setAttribute('data-path', path);
        input.onchange = (e) => {
            let v = e.target.value;
            if(!isNaN(v) && v.trim() !== "") v = parseFloat(v);
            update(v);
            if(previewKeys.includes(label)) render();
        };
        wrap.appendChild(input); row.appendChild(wrap);
        if(previewKeys.includes(label)) {
            const preview = document.createElement('div'); preview.className = 'sprite-preview';
            const canv = document.createElement('canvas'); canv.width = 115; canv.height = 115;
            preview.appendChild(canv); row.appendChild(preview);
            updateCanvas(canv, init);
        }
        parent.appendChild(row);
    }

    function getObjectByPath(path) {
        let parts = path.split('.');
        let res = weaponData;
        for(let p of parts) res = res[p];
        return res;
    }

    function syncInputs() {
        const inputs = document.querySelectorAll('input[data-path]');
        inputs.forEach(input => { input.value = getObjectByPath(input.getAttribute('data-path')); });
    }

    function updateCanvas(canv, name) {
        const spr = getBestSprite(name);
        if (!spr || !spriteSheet.complete) return;
        const ctx = canv.getContext('2d');
        const ratio = Math.min(115/spr.aw, 115/spr.ah) * 0.9;
        ctx.clearRect(0,0,115,115);
        ctx.drawImage(spriteSheet, spr.x, spr.y, spr.aw, spr.ah, (115 - spr.aw*ratio)/2, (115 - spr.ah*ratio)/2, spr.aw*ratio, spr.ah*ratio);
    }

    // --- IMPORT / EXPORT SYSTEM ---
    document.getElementById('fileIn').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            weaponData = JSON.parse(ev.target.result);
            render();
            document.getElementById('log').innerText = `> Loaded JSON: ${e.target.files[0].name}`;
        };
        reader.readAsText(e.target.files[0]);
    });

    document.getElementById('stateIn').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            weaponData = JSON.parse(ev.target.result);
            render();
            document.getElementById('log').innerText = `> Session Progress Restored: ${e.target.files[0].name}`;
        };
        reader.readAsText(e.target.files[0]);
    });

    function saveSession() {
        if(!weaponData) return alert("No progress to save.");
        const blob = new Blob([JSON.stringify(weaponData)], {type: "application/octet-stream"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "WeaponEditor_Progress.sav";
        a.click();
        document.getElementById('log').innerText = `> Progress Saved to .sav file.`;
    }

    function render() {
        const pane = document.getElementById('editor-pane');
        pane.innerHTML = '';
        if (weaponData) build(weaponData, pane);
    }

    function exportJSON() {
        if(!weaponData) return;
        const blob = new Blob([JSON.stringify(weaponData, null, "\t")], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "BTD5_Final_Weapon.json";
        a.click();
    }
</script>

</html>
