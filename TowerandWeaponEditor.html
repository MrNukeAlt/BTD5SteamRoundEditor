<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTD5 Architect - Sprite Path & Damage Editor</title>
    <style>
        :root { --bg: #0b0b0b; --card: #161616; --accent: #ff9800; --text: #d1d1d1; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .controls { background: #111; padding: 12px 20px; border-bottom: 2px solid #333; display: flex; gap: 15px; align-items: center; }
        #editor-pane { flex: 1; overflow-y: auto; padding: 20px 10%; }
        .edit-box { background: var(--card); padding: 12px; border-radius: 6px; border: 1px solid #2a2a2a; margin-top: 10px; }
        label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        
        .field-row { display: flex; align-items: center; gap: 12px; }
        
        /* Sprite Preview Box with Disclaimer Overlay */
        .sprite-preview { 
            width: 90px; height: 90px; border: 2px solid #333; background: #000; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 6px;
            flex-shrink: 0; box-shadow: inset 0 0 10px rgba(0,255,0,0.1);
            position: relative;
        }
        .sprite-preview::after {
            content: "REF ONLY";
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            color: #ff9800;
            font-size: 8px;
            text-align: center;
            padding: 2px 0;
            font-weight: bold;
            pointer-events: none;
        }
        .sprite-preview canvas { image-rendering: pixelated; }

        input, select { background: #000; border: 1px solid #333; color: #0f0; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; }
        select { cursor: pointer; border-color: var(--accent); }
        
        /* Popup Visualizer */
        #bezier-popup { position: fixed; top: 80px; right: 40px; width: 550px; height: 600px; background: #111; border: 2px solid var(--accent); border-radius: 10px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); display: none; flex-direction: column; z-index: 1000; }
        .popup-header { background: var(--accent); color: #000; padding: 10px 15px; cursor: move; font-weight: bold; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; }
        .canvas-area { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #mainCanvas { background: #000; cursor: crosshair; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <input type="file" id="fileInput" style="display:none" accept=".weapon,.tower,.json">
    <button class="btn" style="background:#3498db; color:white" onclick="document.getElementById('fileInput').click()">📂 Load Weapon</button>
    <button class="btn" id="vizToggleBtn" style="background:var(--accent); display:none" onclick="togglePopup()">✨ Preview Path</button>
    <button class="btn" style="background:var(--success); color:white" onclick="downloadJSON()">💾 Export JSON</button>
    <span id="fileNameDisplay" style="color:#666; font-size:0.8rem"></span>
</div>

<div id="editor-pane"><div id="editor"></div></div>

<div id="bezier-popup">
    <div class="popup-header" id="popupHeader"><span>Path Visualizer</span><span onclick="togglePopup()" style="cursor:pointer">✖</span></div>
    <div class="canvas-area">
        <canvas id="mainCanvas" width="500" height="500"></canvas>
    </div>
</div>

<script>
    let currentData = null, curveSegments = [], spriteSheet = new Image();
    let spriteMap = [];
    let scale = 1.0, offsetX = 250, offsetY = 250, isPanning = false, startX, startY, draggingPoint = null;
    
    const damageTypes = ["Piercing", "Plasma", "Juggernaut", "Explosive", "Ice", "Foam"];

    spriteSheet.src = "https://pub-1407f82391df4ab1951418d04be76914.r2.dev/uploads/29736065-7658-4e24-b1a6-60364a2662ad.png";

    // Standard BTD5 Projectile XML Data
    const rawXml = `<?xml version="1.0" encoding="utf-8"?><SpriteInformation><FrameInformation name="BTD5Projectiles"><Cell name="acorn" x="929" y="157" w="37" h="48" ax="0" ay="0" aw="37" ah="48" /><Cell name="bananas" x="785" y="739" w="99" h="76" ax="0" ay="0" aw="99" ah="76" /><Cell name="banana_box" x="672" y="432" w="98" h="116" ax="0" ay="0" aw="98" ah="116" /><Cell name="bee" x="587" y="757" w="102" h="71" ax="0" ay="0" aw="102" ah="71" /><Cell name="bomb_tower_bomb" x="441" y="415" w="76" h="81" ax="0" ay="0" aw="76" ah="81" /><Cell name="bomb_tower_bomb_red" x="2" y="784" w="76" h="81" ax="0" ay="0" aw="76" ah="81" /><Cell name="bomb_tower_missile" x="691" y="279" w="80" h="149" ax="0" ay="0" aw="40" ah="149" /><Cell name="bomb_tower_moab_assassin" x="301" y="415" w="136" h="167" ax="0" ay="0" aw="68" ah="167" /><Cell name="bomb_tower_moab_mauler" x="679" y="2" w="110" h="128" ax="0" ay="0" aw="55" ah="128" /><Cell name="bomb_tower_special_ability_projectile" x="569" y="203" w="118" h="171" ax="0" ay="0" aw="59" ah="171" /><Cell name="boomerang" x="362" y="855" w="70" h="39" ax="0" ay="0" aw="70" ah="39" /><Cell name="boomerang_red" x="611" y="832" w="72" h="39" ax="0" ay="0" aw="72" ah="39" /><Cell name="buccaneer_monkey_pirates_harpoon" x="362" y="822" w="159" h="29" ax="0" ay="0" aw="159" ah="29" /><Cell name="dartling_gun_laser" x="850" y="467" w="46" h="115" ax="0" ay="0" aw="46" ah="115" /><Cell name="dartling_gun_rocket" x="911" y="2" w="42" h="61" ax="0" ay="0" aw="42" ah="61" /><Cell name="dart_monkey_dart" x="873" y="82" w="24" h="79" ax="0" ay="0" aw="24" ah="79" /><Cell name="engineer_foam" x="965" y="77" w="30" h="76" ax="0" ay="0" aw="30" ah="76" /><Cell name="engineer_nail" x="982" y="235" w="9" h="38" ax="0" ay="0" aw="9" ah="38" /><Cell name="evil_monkey_temple_projectile" x="332" y="228" w="192" h="183" ax="0" ay="0" aw="192" ah="183" /><Cell name="frag_shrapnel" x="923" y="266" w="23" h="38" ax="0" ay="0" aw="23" ah="38" /><Cell name="glaive" x="379" y="678" w="100" h="106" ax="0" ay="0" aw="100" ah="106" /><Cell name="glaive_red" x="483" y="678" w="100" h="106" ax="0" ay="0" aw="100" ah="106" /><Cell name="glue_gunner_glue_green" x="897" y="214" w="21" h="48" ax="0" ay="0" aw="21" ah="48" /><Cell name="glue_gunner_glue_yellow" x="957" y="235" w="21" h="48" ax="0" ay="0" aw="21" ah="48" /><Cell name="grape" x="891" y="266" w="28" h="35" ax="0" ay="0" aw="28" ah="35" /><Cell name="grilled_pineapple" x="441" y="522" w="105" h="152" ax="0" ay="0" aw="105" ah="152" /><Cell name="helicopter_missile" x="587" y="678" w="40" h="67" ax="0" ay="0" aw="40" ah="67" /><Cell name="hot_tacks" x="124" y="620" w="122" h="91" ax="0" ay="0" aw="122" ah="91" /><Cell name="ice_shard" x="873" y="165" w="20" h="80" ax="0" ay="0" aw="20" ah="80" /><Cell name="intense_magic" x="250" y="696" w="100" h="100" ax="0" ay="0" aw="100" ah="100" /><Cell name="juggernaut_ball_01" x="528" y="378" w="140" h="140" ax="0" ay="0" aw="140" ah="140" /><Cell name="meerkat_pro_laser" x="929" y="209" w="24" h="53" ax="0" ay="0" aw="24" ah="53" /><Cell name="mm_box" x="133" y="478" w="133" h="138" ax="11" ay="1" aw="148" ah="148" /><Cell name="mm_bundle" x="775" y="279" w="112" h="79" ax="0" ay="0" aw="112" ah="79" /><Cell name="mm_wad" x="104" y="715" w="114" h="74" ax="0" ay="0" aw="114" ah="74" /><Cell name="monkey_apprentice_dragon_breath" x="793" y="2" w="76" h="122" ax="0" ay="0" aw="59" ah="115" /><Cell name="monkey_apprentice_fireball" x="845" y="589" w="48" h="80" ax="0" ay="0" aw="48" ah="80" /><Cell name="monkey_apprentice_lightning" x="354" y="788" w="207" h="30" ax="0" ay="0" aw="207" ah="30" /><Cell name="monkey_farmer_pro_banana" x="176" y="800" w="106" h="54" ax="0" ay="0" aw="106" ah="54" /><Cell name="monkey_temple_bomb_tower_projectile" x="693" y="757" w="60" h="118" ax="0" ay="0" aw="60" ah="118" /><Cell name="monkey_temple_glue_tower_projectile" x="873" y="2" w="34" h="76" ax="0" ay="0" aw="34" ah="76" /><Cell name="monkey_temple_ice_tower_projectile" x="774" y="467" w="72" h="118" ax="0" ay="0" aw="72" ah="118" /><Cell name="monkey_temple_main_projectile" x="133" y="316" w="164" h="158" ax="0" ay="0" aw="164" ah="158" /><Cell name="monkey_temple_supermonkey_projectile" x="286" y="822" w="72" h="72" ax="0" ay="0" aw="72" ah="72" /><Cell name="mortar_big_one_bomb" x="379" y="586" w="52" h="81" ax="0" ay="0" aw="52" ah="81" /><Cell name="navy_harpoon" x="525" y="832" w="82" h="54" ax="0" ay="0" aw="82" ah="54" /><Cell name="ninja_throwing_star" x="911" y="77" w="50" h="50" ax="0" ay="0" aw="50" ah="50" /><Cell name="pineapple" x="550" y="522" w="105" h="152" ax="0" ay="0" aw="105" ah="152" /><Cell name="pop_and_awe_bomb" x="2" y="316" w="127" h="215" ax="0" ay="0" aw="127" ah="215" /><Cell name="Seeking_bolt" x="691" y="134" w="91" h="141" ax="0" ay="0" aw="91" ah="141" /><Cell name="spectre_mortar_bomb" x="957" y="2" w="36" h="71" ax="0" ay="0" aw="36" ah="71" /><Cell name="spiked_ball" x="270" y="586" w="105" h="106" ax="0" ay="0" aw="105" ah="106" /><Cell name="spiked_mine" x="659" y="552" w="105" h="106" ax="0" ay="0" aw="105" ah="106" /><Cell name="spikeopult_ball" x="845" y="673" w="52" h="52" ax="0" ay="0" aw="52" ah="52" /><Cell name="submarine_bmissile" x="785" y="589" w="56" h="146" ax="12" ay="3" aw="80" ah="149" /><Cell name="submarine_dart" x="901" y="131" w="24" h="79" ax="0" ay="0" aw="24" ah="79" /><Cell name="submarine_first_strike_missile" x="569" y="2" w="106" h="197" ax="0" ay="0" aw="106" ah="197" /><Cell name="supermonkey_laser_vision_projectile" x="757" y="819" w="72" h="74" ax="0" ay="0" aw="72" ah="74" /><Cell name="supermonkey_laser_vision_projectile_single" x="970" y="157" w="24" h="74" ax="0" ay="0" aw="24" ah="74" /><Cell name="supermonkey_plasma_vision_projectile" x="2" y="670" w="98" h="110" ax="0" ay="0" aw="98" ah="110" /><Cell name="supermonkey_sun_god_projectile" x="82" y="793" w="90" h="64" ax="0" ay="0" aw="90" ah="64" /><Cell name="supermonkey_tech_terror_projectile" x="2" y="535" w="118" h="131" ax="0" ay="0" aw="118" ah="131" /><Cell name="tacks" x="659" y="662" w="122" h="91" ax="0" ay="0" aw="122" ah="91" /><Cell name="tack_shooter_tack" x="950" y="287" w="18" h="46" ax="0" ay="0" aw="18" ah="46" /><Cell name="tempest_tornado" x="2" y="2" w="326" h="310" ax="0" ay="0" aw="326" ah="310" /><Cell name="track_glue" x="775" y="362" w="86" h="101" ax="0" ay="0" aw="86" ah="101" /><Cell name="tribal_turtle_coconut" x="833" y="819" w="42" h="63" ax="0" ay="0" aw="42" ah="63" /><Cell name="tribal_turtle_spear" x="528" y="228" w="36" h="120" ax="0" ay="0" aw="36" ah="120" /><Cell name="whirlwind" x="332" y="2" w="233" h="222" ax="0" ay="0" aw="233" ah="222" /><Cell name="wizard_lord_phoenix_flame" x="793" y="128" w="76" h="122" ax="0" ay="0" aw="76" ah="122" /></FrameInformation></SpriteInformation>`;

    const xmlDoc = new DOMParser().parseFromString(rawXml, "text/xml");
    const cells = xmlDoc.getElementsByTagName("Cell");
    for(let cell of cells) {
        spriteMap.push({
            name: cell.getAttribute("name"),
            x: parseInt(cell.getAttribute("x")), y: parseInt(cell.getAttribute("y")),
            w: parseInt(cell.getAttribute("w")), h: parseInt(cell.getAttribute("h")),
            aw: parseInt(cell.getAttribute("aw")), ah: parseInt(cell.getAttribute("ah"))
        });
    }

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const popup = document.getElementById('bezier-popup');

    function togglePopup() { popup.style.display = (popup.style.display === 'flex') ? 'none' : 'flex'; draw(); }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentData = JSON.parse(ev.target.result);
            document.getElementById('fileNameDisplay').innerText = e.target.files[0].name;
            refreshApp();
        };
        reader.readAsText(e.target.files[0]);
    });

    function refreshApp() {
        curveSegments = [];
        findCurves(currentData);
        document.getElementById('vizToggleBtn').style.display = (curveSegments.length > 0) ? 'block' : 'none';
        renderEditor();
        draw();
    }

    function findCurves(obj) {
        if (typeof obj !== 'object' || obj === null) return;
        for (let key in obj) {
            if (key === "Curves" && Array.isArray(obj[key])) curveSegments = obj[key];
            else findCurves(obj[key]);
        }
    }

    function getBestSprite(name) {
        if (!name) return null;
        const target = name.toLowerCase();
        return spriteMap.find(s => s.name.toLowerCase() === target) || 
               spriteMap.find(s => target.includes(s.name.toLowerCase())) ||
               spriteMap.find(s => s.name.toLowerCase().includes(target));
    }

    function updateThumb(canvas, spriteName) {
        const spr = getBestSprite(spriteName);
        const tctx = canvas.getContext('2d');
        tctx.clearRect(0, 0, canvas.width, canvas.height);
        if(spr && spriteSheet.complete) {
            const ratio = Math.min(canvas.width / spr.aw, canvas.height / spr.ah);
            const dw = spr.aw * ratio;
            const dh = spr.ah * ratio;
            tctx.drawImage(spriteSheet, spr.x, spr.y, spr.w, spr.h, (canvas.width - dw) / 2, (canvas.height - dh) / 2, dw, dh);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        if (curveSegments.length > 0) {
            ctx.beginPath(); ctx.strokeStyle = '#444'; ctx.lineWidth = 1/scale;
            ctx.setLineDash([5, 5]);
            curveSegments.forEach((seg, i) => {
                if (seg.length === 4) {
                    if (i === 0) ctx.moveTo(seg[0][0], seg[0][1]);
                    ctx.bezierCurveTo(seg[1][0], seg[1][1], seg[2][0], seg[2][1], seg[3][0], seg[3][1]);
                }
            });
            ctx.stroke(); ctx.setLineDash([]);

            const sprite = getBestSprite(currentData.GraphicName || currentData.SpriteFile || "");
            curveSegments.forEach(seg => {
                seg.forEach((p, pi) => {
                    if (sprite && spriteSheet.complete) {
                        ctx.drawImage(spriteSheet, sprite.x, sprite.y, sprite.w, sprite.h, 
                                      p[0] - (sprite.aw / 2), p[1] - (sprite.ah / 2), 
                                      sprite.aw, sprite.ah);
                    }
                    ctx.fillStyle = pi === 0 || pi === 3 ? '#2ecc71' : '#3498db';
                    ctx.beginPath(); ctx.arc(p[0], p[1], 5 / scale, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = "white"; ctx.lineWidth = 1 / scale; ctx.stroke();
                });
            });
        }
        ctx.restore();
    }

    function renderEditor() {
        const container = document.getElementById('editor');
        container.innerHTML = '';
        const build = (obj, parent) => {
            for (let key in obj) {
                const div = document.createElement('div');
                div.className = 'edit-box';
                div.innerHTML = `<label>${key}</label>`;
                const fieldRow = document.createElement('div');
                fieldRow.className = 'field-row';

                // Damage Type Dropdown
                if (key === "DamageType") {
                    const sel = document.createElement('select');
                    damageTypes.forEach(t => {
                        const opt = document.createElement('option');
                        opt.value = t; opt.innerText = t;
                        if(obj[key] === t) opt.selected = true;
                        sel.appendChild(opt);
                    });
                    sel.onchange = (e) => { obj[key] = e.target.value; };
                    div.appendChild(sel);
                } 
                // Sprite Selection with Reference Disclaimer on Preview
                else if (key === "GraphicName" || key === "SpriteFile") {
                    const preview = document.createElement('div');
                    preview.className = 'sprite-preview';
                    preview.title = "This preview is for visual reference only.";
                    const pCanv = document.createElement('canvas');
                    pCanv.width = 90; pCanv.height = 90;
                    preview.appendChild(pCanv);

                    const input = document.createElement('input');
                    input.value = obj[key];
                    input.oninput = (e) => { obj[key] = e.target.value; updateThumb(pCanv, e.target.value); draw(); };
                    
                    fieldRow.appendChild(input);
                    fieldRow.appendChild(preview);
                    div.appendChild(fieldRow);
                    updateThumb(pCanv, obj[key]);
                } 
                else if (Array.isArray(obj[key]) && typeof obj[key][0] === 'number') {
                    obj[key].forEach((v, i) => {
                        const input = document.createElement('input'); input.type='number'; input.value=v;
                        input.oninput = (e) => { obj[key][i] = parseFloat(e.target.value); draw(); };
                        div.appendChild(input);
                    });
                } 
                else if (typeof obj[key] === 'object' && obj[key] !== null) {
                    build(obj[key], div);
                } 
                else {
                    const input = document.createElement('input'); input.value=obj[key];
                    input.oninput = (e) => { obj[key] = isNaN(e.target.value) ? e.target.value : parseFloat(e.target.value); };
                    div.appendChild(input);
                }
                parent.appendChild(div);
            }
        };
        build(currentData, container);
    }

    canvas.onmousedown = (e) => {
        const x = (e.offsetX - offsetX) / scale;
        const y = (e.offsetY - offsetY) / scale;
        for (let seg of curveSegments) {
            for (let p of seg) { if (Math.hypot(p[0]-x, p[1]-y) < 25 / scale) { draggingPoint = p; return; } }
        }
        isPanning = true; startX = e.offsetX - offsetX; startY = e.offsetY - offsetY;
    };
    window.onmousemove = (e) => {
        if (draggingPoint) { 
            draggingPoint[0] = Math.round((e.offsetX - offsetX) / scale); 
            draggingPoint[1] = Math.round((e.offsetY - offsetY) / scale); 
            draw(); renderEditor(); 
        } else if (isPanning) { 
            offsetX = e.offsetX - startX; offsetY = e.offsetY - startY; draw(); 
        }
    };
    window.onmouseup = () => { draggingPoint = null; isPanning = false; };
    canvas.onwheel = (e) => { e.preventDefault(); scale *= (e.deltaY < 0 ? 1.1 : 0.9); draw(); };

    function downloadJSON() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(currentData, null, "\t")], {type: "text/plain"}));
        a.download = (currentData.GraphicName || "export") + ".json";
        a.click();
    }
</script>
</body>
</html>
