<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTD5 Architect - Popup Editor</title>
    <style>
        :root { --bg: #0b0b0b; --card: #161616; --accent: #ff9800; --text: #d1d1d1; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .controls { background: #111; padding: 12px 20px; border-bottom: 2px solid #333; display: flex; gap: 15px; align-items: center; }
        
        /* Main Layout */
        #editor-pane { flex: 1; overflow-y: auto; padding: 20px 10%; }
        .edit-box { background: var(--card); padding: 12px; border-radius: 6px; border: 1px solid #2a2a2a; margin-top: 10px; }
        label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #333; color: #0f0; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; font-family: 'Consolas', monospace; }
        
        /* Floating Popup Window */
        #bezier-popup { 
            position: fixed; top: 100px; right: 50px; width: 500px; height: 550px; 
            background: #111; border: 2px solid var(--accent); border-radius: 10px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8); display: none; flex-direction: column; z-index: 1000;
        }
        .popup-header { 
            background: var(--accent); color: #000; padding: 8px 15px; cursor: move; 
            font-weight: bold; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; 
        }
        .close-btn { cursor: pointer; font-weight: bold; }
        
        .canvas-area { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        canvas { background: #000; cursor: crosshair; }

        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-viz { background: var(--accent); color: black; display: none; }
    </style>
</head>
<body>

<div class="controls">
    <input type="file" id="fileInput" style="display:none" accept=".weapon,.tower,.json">
    <button class="btn btn-blue" onclick="document.getElementById('fileInput').click()">📂 Load File</button>
    <button class="btn btn-viz" id="vizToggleBtn" onclick="togglePopup()">✨ Open Path Preview</button>
    <button class="btn" style="background:var(--success); color:white" onclick="downloadJSON()">💾 Export</button>
    <span id="fileNameDisplay" style="color:#666; font-size:0.9rem"></span>
</div>

<div id="editor-pane">
    <div id="editor"></div>
</div>

<div id="bezier-popup">
    <div class="popup-header" id="popupHeader">
        <span>Bézier Path Visualizer</span>
        <span class="close-btn" onclick="togglePopup()">✖</span>
    </div>
    <div class="canvas-area">
        <canvas id="bezierCanvas" width="500" height="500"></canvas>
    </div>
    <div style="padding:10px; font-size:0.7rem; color:#888; text-align:center; background:#111">
        Middle-Click to Pan | Scroll to Zoom | Drag Points to Edit
    </div>
</div>

<script>
    let currentData = null;
    let curveSegments = [];
    let scale = 1.0, offsetX = 250, offsetY = 250;
    let isPanning = false, startX, startY, draggingPoint = null;
    
    const canvas = document.getElementById('bezierCanvas');
    const ctx = canvas.getContext('2d');
    const popup = document.getElementById('bezier-popup');

    // Dragging the Popup
    dragElement(popup);

    function dragElement(elmnt) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        document.getElementById("popupHeader").onmousedown = dragMouseDown;
        function dragMouseDown(e) { e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
        function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
        function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
    }

    function togglePopup() {
        popup.style.display = (popup.style.display === 'flex') ? 'none' : 'flex';
        draw();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentData = JSON.parse(ev.target.result);
            document.getElementById('fileNameDisplay').innerText = e.target.files[0].name;
            refreshApp();
        };
        reader.readAsText(e.target.files[0]);
    });

    function refreshApp() {
        curveSegments = [];
        findCurves(currentData);
        document.getElementById('vizToggleBtn').style.display = (curveSegments.length > 0) ? 'block' : 'none';
        renderEditor();
        draw();
    }

    function findCurves(obj) {
        if (typeof obj !== 'object' || obj === null) return;
        for (let key in obj) {
            if (key === "Curves" && Array.isArray(obj[key])) curveSegments = obj[key];
            else findCurves(obj[key]);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Center Crosshair
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1/scale;
        ctx.beginPath(); ctx.moveTo(-2000, 0); ctx.lineTo(2000, 0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -2000); ctx.lineTo(0, 2000); ctx.stroke();

        if (curveSegments.length > 0) {
            ctx.beginPath();
            ctx.strokeStyle = '#ff9800';
            ctx.lineWidth = 3/scale;
            curveSegments.forEach((seg, i) => {
                if (seg.length === 4) {
                    if (i === 0) ctx.moveTo(seg[0][0], seg[0][1]);
                    ctx.bezierCurveTo(seg[1][0], seg[1][1], seg[2][0], seg[2][1], seg[3][0], seg[3][1]);
                }
            });
            ctx.stroke();

            curveSegments.forEach(seg => {
                seg.forEach((p, pi) => {
                    ctx.fillStyle = pi === 0 || pi === 3 ? '#2ecc71' : '#3498db';
                    ctx.beginPath(); ctx.arc(p[0], p[1], 5/scale, 0, Math.PI*2); ctx.fill();
                });
            });
        }
        ctx.restore();
    }

    canvas.onmousedown = (e) => {
        const x = (e.offsetX - offsetX) / scale;
        const y = (e.offsetY - offsetY) / scale;
        for (let seg of curveSegments) {
            for (let p of seg) {
                if (Math.hypot(p[0]-x, p[1]-y) < 12/scale) { draggingPoint = p; return; }
            }
        }
        isPanning = true; startX = e.offsetX - offsetX; startY = e.offsetY - offsetY;
    };

    window.onmousemove = (e) => {
        if (draggingPoint) {
            draggingPoint[0] = Math.round((e.offsetX - offsetX) / scale);
            draggingPoint[1] = Math.round((e.offsetY - offsetY) / scale);
            draw(); renderEditor();
        } else if (isPanning) {
            offsetX = e.offsetX - startX; offsetY = e.offsetY - startY; draw();
        }
    };

    window.onmouseup = () => { draggingPoint = null; isPanning = false; };
    canvas.onwheel = (e) => { e.preventDefault(); scale *= (e.deltaY < 0 ? 1.1 : 0.9); draw(); };

    function renderEditor() {
        const container = document.getElementById('editor');
        container.innerHTML = '';
        const build = (obj, parent) => {
            for (let key in obj) {
                const div = document.createElement('div');
                div.className = 'edit-box';
                if (Array.isArray(obj[key]) && typeof obj[key][0] === 'number') {
                    div.innerHTML = `<label>${key}</label>`;
                    obj[key].forEach((v, i) => {
                        const input = document.createElement('input'); input.type='number'; input.value=v;
                        input.oninput = (e) => { obj[key][i] = parseFloat(e.target.value); draw(); };
                        div.appendChild(input);
                    });
                } else if (typeof obj[key] === 'object' && obj[key] !== null) {
                    div.innerHTML = `<label>${key}</label>`;
                    build(obj[key], div);
                } else {
                    div.innerHTML = `<label>${key}</label>`;
                    const input = document.createElement('input'); input.value=obj[key];
                    input.oninput = (e) => { obj[key] = isNaN(e.target.value) ? e.target.value : parseFloat(e.target.value); };
                    div.appendChild(input);
                }
                parent.appendChild(div);
            }
        };
        build(currentData, container);
    }

    function downloadJSON() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(currentData, null, "\t")], {type:"text/plain"}));
        a.download = "mod_path.json";
        a.click();
    }
</script>
</body>
</html>
