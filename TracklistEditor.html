<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tracklist Master - Full Structure</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --danger: #ef4444; --success: #10b981; --warning: #f59e0b; --coop: #a855f7; --highlight: #fbbf24; }
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
        
        header { background: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.1rem; color: var(--primary); }

        .file-upload-zone { background: #1e293b; padding: 10px 2rem; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #334155; font-size: 0.8rem; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-input-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }

        main { display: grid; grid-template-columns: 1fr 500px; flex: 1; overflow: hidden; }
        
        .editor-pane { overflow-y: auto; padding: 2rem; height: 100%; box-sizing: border-box; }
        .sticky-controls { position: sticky; top: -2rem; z-index: 10; background: var(--bg); padding-bottom: 1rem; margin-bottom: 1rem; border-bottom: 2px solid #1e293b; }

        .tabs { display: flex; gap: 5px; margin-bottom: 1rem; }
        .tab { padding: 10px 20px; background: #1e293b; cursor: pointer; border-radius: 6px; font-weight: bold; border: 1px solid #334155; opacity: 0.6; transition: 0.2s; }
        .tab.active { opacity: 1; background: var(--primary); color: white; }
        .tab.coop-tab.active { background: var(--coop); }

        .track-card { background: var(--card); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; border: 1px solid #334155; position: relative; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
        .track-card.modified { border-color: var(--highlight); }
        
        .field { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.6rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        input { background: #0f172a; border: 1px solid #475569; color: white; padding: 6px; border-radius: 4px; font-size: 0.8rem; }
        
        .btn { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 0.75rem; transition: 0.2s; }
        .btn:hover { filter: brightness(1.2); }

        .preview-pane { background: #000; border-left: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .preview-toolbar { padding: 8px; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #json-output { margin: 0; padding: 1.5rem; font-family: 'Consolas', monospace; font-size: 0.8rem; color: #10b981; white-space: pre; overflow: auto; flex: 1; line-height: 1.4; }
        
        mark { background: var(--highlight); color: #000; border-radius: 2px; padding: 0 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo">TRACKLIST MASTER v2.0</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn" style="background: #334155; color: white; border: 1px solid #475569;" onclick="syncStandardToCoop()">SYNC STD ➔ CO-OP</button>
        <button class="btn" style="background: #334155; color: white; border: 1px solid #475569;" onclick="syncCoopToStandard()">SYNC CO-OP ➔ STD</button>
        <button class="btn" style="background: var(--primary); color:white;" onclick="downloadJSON('standard')">SAVE tracklist.json</button>
        <button class="btn" style="background: var(--coop); color:white;" onclick="downloadJSON('coop')">SAVE coop_tracklist.json</button>
    </div>
</header>

<div class="file-upload-zone">
    <strong>📂 LOAD LOCAL JSON:</strong>
    <div class="file-input-wrapper">
        <button class="btn" style="background: #475569; color: white;">Choose File</button>
        <input type="file" id="fileInput" accept=".json" onchange="handleFileSelect(event)">
    </div>
    <span id="fileNameDisplay" style="color: #94a3b8;">Select a file to populate current view</span>
</div>

<main>
    <div class="editor-pane">
        <div class="sticky-controls">
            <div class="tabs">
                <div id="tab-std" class="tab active" onclick="switchTab('standard')">STANDARD LIST</div>
                <div id="tab-coop" class="tab coop-tab" onclick="switchTab('coop')">CO-OP LIST</div>
            </div>
            <button class="btn" style="background: var(--success); color: white; width: 100%" onclick="addTrack()">+ ADD NEW LEVEL TO TRACKS</button>
        </div>
        <div id="container"></div>
    </div>
    <div class="preview-pane">
        <div class="preview-toolbar">
            <span style="font-size: 0.7rem; color: #64748b; font-weight: bold;">LIVE JSON PREVIEW (FULL STRUCTURE)</span>
            <button class="btn" style="background: #222; color: #888; border: 1px solid #444; padding: 4px 8px;" onclick="clearHighlights()">Clear Highlights</button>
        </div>
        <pre id="json-output"></pre>
    </div>
</main>

<script>
    let currentView = 'standard';
    
    // Initializing with the full structure provided
    const defaultTemplate = () => ({
        "Size": [250, 180],
        "DifficultyColours": [
            [154, 212, 0], [65, 174, 248], [249, 241, 14], [248, 65, 65], [254, 175, 50]
        ],
        "DifficultyDescriptions": [
            "LOC_DIF_DESC_Beginner", "LOC_DIF_DESC_Intermediate", "LOC_DIF_DESC_Advanced", "LOC_DIF_DESC_Expert", "LOC_DIF_DESC_Extreme"
        ],
        "Tracks": []
    });

    let data = {
        standard: defaultTemplate(),
        coop: defaultTemplate()
    };
    
    let modifiedFields = new Set();

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                // Ensure the loaded file has the required keys
                const merged = {...defaultTemplate(), ...json};
                if (file.name.includes('coop')) {
                    data.coop = merged;
                    switchTab('coop');
                } else {
                    data.standard = merged;
                    switchTab('standard');
                }
                modifiedFields.clear();
                render();
            } catch (err) { alert("Invalid JSON file"); }
        };
        reader.readAsText(file);
    }

    function switchTab(view) {
        currentView = view;
        document.getElementById('tab-std').classList.toggle('active', view === 'standard');
        document.getElementById('tab-coop').classList.toggle('active', view === 'coop');
        render();
    }

    function update(idx, col, val) {
        if ([0, 3, 4].includes(col)) val = parseInt(val) || 0;
        data[currentView].Tracks[idx][col] = val;
        modifiedFields.add(`${currentView}-T-${idx}-${col}`);
        render();
    }

    function clearHighlights() {
        modifiedFields.clear();
        render();
    }

    function syncStandardToCoop() {
        const coopNames = new Set(data.coop.Tracks.map(t => t[1]));
        data.standard.Tracks.forEach(t => {
            if (!coopNames.has(t[1])) {
                data.coop.Tracks.push([...t]);
                modifiedFields.add(`coop-T-${data.coop.Tracks.length-1}-1`); 
            }
        });
        render();
    }

    function syncCoopToStandard() {
        const stdNames = new Set(data.standard.Tracks.map(t => t[1]));
        data.coop.Tracks.forEach(t => {
            if (!stdNames.has(t[1])) {
                data.standard.Tracks.push([...t]);
                modifiedFields.add(`standard-T-${data.standard.Tracks.length-1}-1`);
            }
        });
        render();
    }

    function render() {
        const container = document.getElementById('container');
        container.innerHTML = '';
        
        // Render Global Settings First
        const settingsCard = document.createElement('div');
        settingsCard.className = 'track-card';
        settingsCard.style.gridTemplateColumns = '1fr 1fr';
        settingsCard.innerHTML = `
            <div class="field"><label>Map Width</label><input type="number" value="${data[currentView].Size[0]}" oninput="data['${currentView}'].Size[0]=parseInt(this.value); render();"></div>
            <div class="field"><label>Map Height</label><input type="number" value="${data[currentView].Size[1]}" oninput="data['${currentView}'].Size[1]=parseInt(this.value); render();"></div>
        `;
        container.appendChild(settingsCard);

        // Render Tracks
        data[currentView].Tracks.forEach((track, idx) => {
            const isRowModified = Array.from(modifiedFields).some(m => m.startsWith(`${currentView}-T-${idx}`));
            const card = document.createElement('div');
            card.className = `track-card ${isRowModified ? 'modified' : ''}`;
            card.innerHTML = `
                <button class="btn" style="background:var(--danger); color:white; position:absolute; top:-5px; right:-5px; width:20px; height:20px; padding:0; border-radius:4px" onclick="data['${currentView}'].Tracks.splice(${idx},1); render();">×</button>
                <div class="field"><label>Diff</label><input type="number" value="${track[0]}" oninput="update(${idx},0,this.value)"></div>
                <div class="field"><label>Name</label><input type="text" value="${track[1]}" oninput="update(${idx},1,this.value)"></div>
                <div class="field"><label>Locale</label><input type="text" value="${track[2]}" oninput="update(${idx},2,this.value)"></div>
                <div class="field"><label>ID1</label><input type="number" value="${track[3]}" oninput="update(${idx},3,this.value)"></div>
                <div class="field"><label>ID2</label><input type="number" value="${track[4]}" oninput="update(${idx},4,this.value)"></div>
                <div class="field" style="flex-direction:row; align-items:center; gap:5px; padding-top:10px">
                    <label>B1</label><input type="checkbox" ${track[5]?'checked':''} onchange="update(${idx},5,this.checked)">
                    <label>B2</label><input type="checkbox" ${track[6]?'checked':''} onchange="update(${idx},6,this.checked)">
                </div>
            `;
            container.appendChild(card);
        });

        const output = document.getElementById('json-output');
        output.innerHTML = generateFullHighlightedJSON(data[currentView]);
    }

    function generateFullHighlightedJSON(obj) {
        let jsonStr = `{\n`;
        jsonStr += `    "Size" : [ ${obj.Size[0]}, ${obj.Size[1]} ],\n`;
        
        jsonStr += `    "DifficultyColours" :\n    [\n`;
        jsonStr += obj.DifficultyColours.map(c => `        [${c.join(', ')}]`).join(',\n');
        jsonStr += `\n    ],\n`;

        jsonStr += `    "DifficultyDescriptions" :\n    [\n`;
        jsonStr += obj.DifficultyDescriptions.map(d => `        "${d}"`).join(',\n');
        jsonStr += `\n    ],\n`;

        jsonStr += `    "Tracks" :\n    [\n`;
        let tracksFormatted = obj.Tracks.map((row, rIdx) => {
            let rowItems = row.map((val, cIdx) => {
                let displayVal = typeof val === 'string' ? `"${val}"` : val;
                if (modifiedFields.has(`${currentView}-T-${rIdx}-${cIdx}`)) {
                    return `<mark>${displayVal}</mark>`;
                }
                return displayVal;
            });
            return `        [ ${rowItems.join(', ')} ]`;
        }).join(',\n');
        
        jsonStr += tracksFormatted + `\n    ]\n}`;
        return jsonStr;
    }

    function addTrack() {
        data[currentView].Tracks.unshift([0, "new_level", "LOC_MAP_new", 0, 0, false, false]);
        modifiedFields.add(`${currentView}-T-0-1`);
        render();
    }

    function downloadJSON(type) {
        const blob = new Blob([JSON.stringify(data[type], null, 4)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = type === 'standard' ? "tracklist.json" : "coop_tracklist.json";
        a.click();
    }

    render();
</script>
</body>
</html>
